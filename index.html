<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Atlas Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#08090a;--panel:#0d0f11;--card:#131518;--border:rgba(255,255,255,0.05);--border-act:rgba(255,255,255,0.08);--text:#e4e6ea;--dim:#9095a0;--muted:#555a63;--amber:#f0a030;--amber-dim:rgba(240,160,48,0.08);--green:#00c853;--red:#f44336;--green-dim:rgba(0,200,83,0.06);--red-dim:rgba(244,67,54,0.06);--font:'JetBrains Mono',monospace;--sans:'Inter','PingFang SC',sans-serif;--nav-w:180px;--accent:#6366f1;--accent-dim:rgba(99,102,241,0.08)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.55;-webkit-font-smoothing:antialiased}
body{min-height:100dvh;display:flex}
nav.sidebar{width:var(--nav-w);min-width:var(--nav-w);background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:12px 0;position:fixed;top:0;left:0;bottom:0;z-index:50}
nav.sidebar .logo{font-family:var(--sans);font-size:14px;font-weight:600;color:var(--accent);padding:0 16px 16px;border-bottom:1px solid var(--border);margin-bottom:8px}
nav.sidebar .logo span{color:var(--dim);font-weight:400;font-size:9px;margin-left:4px}
nav.sidebar a{display:flex;align-items:center;gap:8px;padding:8px 16px;color:var(--dim);text-decoration:none;font-size:12px;font-family:var(--sans);font-weight:500;border-left:2px solid transparent;transition:all 0.15s}
nav.sidebar a:hover{color:var(--text);background:rgba(255,255,255,0.03)}
nav.sidebar a.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-dim)}
nav.sidebar a .dot{width:5px;height:5px;border-radius:50%;background:var(--muted)}
nav.sidebar a.active .dot{background:var(--accent)}
nav.sidebar .spacer{flex:1}
nav.sidebar .time{font-size:9px;color:var(--muted);padding:8px 16px;font-family:var(--font)}
main{margin-left:var(--nav-w);flex:1;padding:0 20px 24px;max-width:900px;overflow-x:hidden}
header.topbar{position:sticky;top:0;z-index:40;background:var(--bg);padding:14px 0 10px;border-bottom:1px solid var(--border);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
header.topbar .page-title{font-family:var(--sans);font-size:18px;font-weight:600;color:var(--text)}
header.topbar .update-badge{font-size:10px;color:var(--muted);font-family:var(--font)}

/* ── AI Analysis Block ── */
.ai-block{margin-bottom:20px}
.ai-block .market-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:8px;font-family:var(--sans);font-weight:600}
.ai-block .market-label .live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.ai-summary{font-size:16px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:12px;font-family:var(--sans)}
.ai-detail{font-size:13px;color:var(--dim);line-height:1.7;margin-bottom:14px;font-family:var(--sans)}
.ai-detail p{margin-bottom:6px}
.ai-detail .up{color:var(--green);font-weight:500}.ai-detail .dn{color:var(--red);font-weight:500}

/* ── Opportunity Cards ── */
.opps{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:8px;margin-bottom:16px}
.opp{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 14px;border-left:2px solid var(--accent)}
.opp .opp-tag{font-size:9px;padding:1px 6px;border-radius:2px;background:var(--accent-dim);color:var(--accent);margin-right:6px;font-family:var(--sans);font-weight:500}
.opp .opp-text{font-size:12px;color:var(--text);margin-top:4px;font-family:var(--sans)}

/* ── Data Row (contextual) ── */
.data-row{display:flex;gap:10px;overflow-x:auto;padding:8px 0;margin-bottom:12px;-webkit-overflow-scrolling:touch;scrollbar-width:none;border-bottom:1px solid var(--border)}
.data-row::-webkit-scrollbar{display:none}
.data-chip{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:4px;padding:6px 10px;font-size:10px;text-align:center;min-width:80px}
.data-chip .chip-label{color:var(--muted);font-size:8px;text-transform:uppercase}
.data-chip .chip-val{font-weight:600;margin-top:2px}
.data-chip .chip-val.up{color:var(--green)}.data-chip .chip-val.dn{color:var(--red)}

/* ── Bottom Nav ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--border);justify-content:space-around;padding:6px 0 env(safe-area-inset-bottom,6px);z-index:50}
.bottom-nav a{display:flex;flex-direction:column;align-items:center;gap:1px;color:var(--muted);text-decoration:none;font-size:9px;padding:4px 8px;border-radius:4px}
.bottom-nav a.active{color:var(--accent)}.bottom-nav a .ico{font-size:16px}

/* ── Empty ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px}
.empty em{color:var(--dim)}

@media(max-width:768px){
  nav.sidebar{display:none}
  main{margin-left:0;padding:0 12px 60px;max-width:100%}
  .bottom-nav{display:flex}
  .ai-summary{font-size:14px}
  .opps{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="logo">ATLAS<span>TERMINAL</span></div>
  <a href="#" class="active" data-page="global"><span class="dot"></span>全景</a>
  <a href="#" data-page="astock"><span class="dot"></span>🇨🇳 A股</a>
  <a href="#" data-page="overseas"><span class="dot"></span>🌏 港美股</a>
  <a href="#" data-page="crypto"><span class="dot"></span>₿ 加密</a>
  <div class="spacer"></div>
  <div class="time" id="clock">00:00 CST</div>
</nav>

<main>
  <header class="topbar">
    <div class="page-title" id="pageTitle">全景</div>
    <div class="update-badge" id="updateBadge">—</div>
  </header>
  <div id="content"></div>
</main>

<nav class="bottom-nav" id="bottomNav"></nav>

<script>
const DATA={analysis:null,ov:null};
const PAGES=['global','astock','overseas','crypto'];
const TITLES={global:'全景',astock:'🇨🇳 A股',overseas:'🌏 港美股',crypto:'₿ 加密'};

async function init(){
  await refreshAll();
  renderPage('global');
  setupNav();
  updateClock();setInterval(updateClock,30000);
  setInterval(refreshAll,300000);
  // Also trigger AI analysis cron
  try{await fetch('data/terminal/analysis.json?t='+Date.now())}catch(e){}
}

async function refreshAll(){
  try{
    const r=await fetch('data/terminal/analysis.json?t='+Date.now());
    if(r.ok)DATA.analysis=await r.json();
  }catch(e){}
  try{const r=await fetch('data/terminal/overview.json?t='+Date.now());if(r.ok)DATA.ov=await r.json()}catch(e){}
  try{const r=await fetch('data/crypto/market.json?t='+Date.now());if(r.ok)DATA.crypto=await r.json()}catch(e){}
  try{const r=await fetch('data/us/live.json?t='+Date.now());if(r.ok)DATA.usLive=await r.json()}catch(e){}
  updateBadge();
}

function updateBadge(){
  const a=DATA.analysis;
  document.getElementById('updateBadge').textContent=a&&a.updated?'更新于 '+a.updated:'分析生成中…';
}

function fpct(v){if(v==null||isNaN(v))return'—';const n=parseFloat(v);return(n>=0?'+':'')+n.toFixed(2)+'%'}
function fprice(v,d){if(v==null)return'—';return v.toLocaleString('en-US',{minimumFractionDigits:d||0,maximumFractionDigits:d||2})}
function updown(v){if(v==null||isNaN(v))return'';return parseFloat(v)>=0?'up':'dn'}

/* ── Render ── */
function renderPage(id){
  document.getElementById('pageTitle').textContent=TITLES[id];
  const a=DATA.analysis;const c=document.getElementById('content');
  if(!a||!a.markets){
    c.innerHTML='<div class="empty">🧠 AI分析生成中…<br><em>每15分钟自动更新，请稍候</em></div>';
    return;
  }
  const m=a.markets;

  switch(id){
    case 'global':
      c.innerHTML=renderSection(m.global,'🌍 全球')+
        '<div class="ai-block">'+quickDataChips()+'</div>';
      break;
    case 'astock':
      c.innerHTML=renderSection(m.astock,'🇨🇳 A股')+
        '<div class="ai-block">'+aStockDataChips()+'</div>';
      break;
    case 'overseas':
      c.innerHTML=renderSection(m.overseas,'🌏 港美股')+
        '<div class="ai-block">'+overseasDataChips()+'</div>';
      break;
    case 'crypto':
      c.innerHTML=renderSection(m.crypto,'₿ 加密')+
        '<div class="ai-block">'+cryptoDataChips()+'</div>';
      break;
  }
}

function renderSection(m,label){
  if(!m)return'<div class="empty">数据收集中…</div>';
  let h='<div class="ai-block">';
  h+=`<div class="market-label">${m.status==='open'||m.status==='live'||m.status==='us_live'?'<span class="live-dot"></span>':''}${label} · ${m.status==='open'?'盘中':m.status==='us_live'?'美股盘中':m.status==='live'?'实时':'已收盘'}</div>`;
  h+=`<div class="ai-summary">${m.summary||''}</div>`;
  
  const details=[m.key_moves,m.us_analysis,m.hk_analysis,m.signals,m.narrative,m.cross_market].filter(Boolean);
  if(details.length)h+=`<div class="ai-detail">${details.map(d=>'<p>'+d+'</p>').join('')}</div>`;

  // Opportunities
  const oppTexts=m.opportunities?m.opportunities.split(/[。；;]/).filter(Boolean):[];
  const riskText=m.risk?`⚠ ${m.risk}`:null;
  if(oppTexts.length||riskText){
    h+='<div class="opps">';
    oppTexts.forEach(t=>{if(t.trim())h+=`<div class="opp"><span class="opp-tag">机会</span><div class="opp-text">${t.trim()}</div></div>`});
    if(riskText)h+=`<div class="opp" style="border-left-color:var(--red)"><span class="opp-tag" style="background:var(--red-dim);color:var(--red)">风险</span><div class="opp-text">${riskText}</div></div>`;
    h+='</div>';
  }
  h+='</div>';
  return h;
}

/* ── Data Chips ── */
function quickDataChips(){
  let h='';
  const ov=DATA.ov;if(!ov||!ov.indices)return h;
  const idx=ov.indices;
  (idx.a||[]).slice(0,2).forEach(x=>h+=chip('🇨🇳 '+x.name,x.val,x.chg));
  if(idx.hk)h+=chip('🇭🇰 '+idx.hk.name,idx.hk.val,idx.hk.chg);
  (idx.us||[]).slice(0,2).forEach(x=>h+=chip('🇺🇸 '+x.name,fprice(x.val),x.chg));
  (idx.crypto||[]).slice(0,2).forEach(x=>h+=chip('₿ '+x.name,fprice(x.val),x.chg));
  return '<div class="data-row">'+h+'</div>';
}
function aStockDataChips(){
  let h='';const ov=DATA.ov;if(!ov||!ov.indices)return h;
  (ov.indices.a||[]).forEach(x=>h+=chip(x.name,x.val,x.chg));
  if(ov.flow)h+=chip('净流入',ov.flow.total_inflow>0?'+'+ov.flow.total_inflow.toFixed(0)+'亿':ov.flow.total_inflow.toFixed(0)+'亿',null);
  return '<div class="data-row">'+h+'</div>';
}
function overseasDataChips(){
  let h='';const ov=DATA.ov;
  if(ov&&ov.indices&&ov.indices.hk)h+=chip('🇭🇰 恒指',ov.indices.hk.val,ov.indices.hk.chg);
  (ov?.indices?.us||[]).slice(0,3).forEach(x=>h+=chip('🇺🇸 '+x.name,fprice(x.val),x.chg));
  const usLive=DATA.usLive;if(usLive&&usLive.indices){
    const vix=usLive.indices.find(i=>i.symbol==='VIX');
    if(vix)h+=chip('VIX',fprice(vix.price,2));
  }
  return '<div class="data-row">'+h+'</div>';
}
function cryptoDataChips(){
  let h='';
  (DATA.crypto?.prices||[]).forEach(x=>h+=chip(x.symbol,fprice(x.price),x.chg_24h));
  return '<div class="data-row">'+h+'</div>';
}
function chip(label,val,chg){
  const cv=chg!=null&&!isNaN(chg)?fpct(chg):'';
  return `<div class="data-chip"><div class="chip-label">${label}</div><div class="chip-val ${cv.startsWith('+')?'up':cv.startsWith('-')?'dn':''}">${val||'—'}</div>${cv?'<div style="font-size:9px;margin-top:1px" class="'+updown(chg)+'">'+cv+'</div>':''}</div>`;
}

/* ── Navigation ── */
function setupNav(){
  const activate=id=>{
    PAGES.forEach(p=>{
      document.querySelectorAll(`nav.sidebar a[data-page="${p}"]`).forEach(x=>x.classList.toggle('active',p===id));
      document.querySelectorAll(`.bottom-nav a[data-page="${p}"]`).forEach(x=>x.classList.toggle('active',p===id));
    });
    renderPage(id);
  };
  document.querySelectorAll('nav.sidebar a[data-page]').forEach(a=>a.addEventListener('click',e=>{e.preventDefault();activate(a.dataset.page)}));
  const btm=document.getElementById('bottomNav');
  btm.innerHTML=PAGES.map(p=>`<a href="#" data-page="${p}" class="${p==='global'?'active':''}"><span class="ico">${{global:'🌍',astock:'🇨🇳',overseas:'🌏',crypto:'₿'}[p]}</span>${TITLES[p]}</a>`).join('');
  btm.querySelectorAll('a').forEach(a=>a.addEventListener('click',e=>{e.preventDefault();activate(a.dataset.page)}));
}

function updateClock(){document.getElementById('clock').textContent=new Date().toTimeString().slice(0,5)+' CST'}
init();
</script>
</body>
</html>
