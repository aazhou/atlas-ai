<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Atlas AI · A股仪表盘</title>
<link rel="stylesheet" href="../style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  .dash { display: grid; gap: 12px; }
  @media (min-width: 768px) { .dash { grid-template-columns: 2fr 1fr; } }
  @media (min-width: 1024px) { .dash { grid-template-columns: 1fr 1fr 1fr; } }
  .card { background: var(--surface-card); border: 1px solid var(--hairline); border-radius: 10px; padding: 16px; }
  .card h3 { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }

  .row { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
  .row .name { font-size: 13px; color: var(--body); font-weight: 500; flex: 1; }
  .row .val { font-family: 'JetBrains Mono',monospace; font-size: 13px; font-weight: 600; text-align: right; }
  .up { color: var(--accent-emerald); } .down { color: var(--accent-rose); }

  .stat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
  .stat-item { text-align: center; padding: 10px 8px; background: rgba(255,255,255,0.02); border-radius: 8px; }
  .stat-item .v { font-family: 'JetBrains Mono',monospace; font-size: 20px; font-weight: 700; }
  .stat-item .l { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .analysis { border-color: rgba(250,255,105,0.12); background: linear-gradient(135deg, rgba(250,255,105,0.03), transparent); }
  .analysis p { font-size: 13px; color: var(--body); line-height: 1.7; margin: 4px 0; }
  .analysis .risk { font-size: 12px; color: #f59e0b; background: rgba(245,158,11,0.06); padding: 6px 10px; border-radius: 6px; }

  @media (max-width: 480px) { .card { padding: 12px; } .stat-item .v { font-size: 16px; } }
</style>
</head>
<body>
<script src="../header.js"></script>
<div class="main">
  <div style="font-size:11px;color:var(--muted-soft);margin-bottom:12px" id="updated">加载中...</div>
  <div id="content"></div>
</div>

<script>
async function load() {
  const date = new Date().toISOString().slice(0,10);
  let sectorData = null, pfData = null;
  try {
    let r = await fetch(`../data/stock/sectors-${date}.json`);
    if (!r.ok) { const yd = new Date(Date.now()-86400000).toISOString().slice(0,10); r = await fetch(`../data/stock/sectors-${yd}.json`); }
    if (r.ok) sectorData = await r.json();
  } catch(e) {}
  try { const r = await fetch('../data/stock/portfolio.json'); if (r.ok) pfData = await r.json(); } catch(e) {}

  if (!sectorData) {
    document.getElementById('content').innerHTML = '<div class="card" style="text-align:center;color:var(--muted);padding:40px">📊 非交易时段，暂无实时数据</div>';
    return;
  }

  document.getElementById('updated').textContent = '更新于 ' + sectorData.updated;
  const sectors = Object.entries(sectorData.sectors).sort((a,b) => b[1].current - a[1].current);
  const upCount = sectors.filter(([,s]) => s.current > 0).length;
  const breadth = upCount / sectors.length * 100;
  const top3 = sectors.slice(0,3); const bot3 = sectors.slice(-3);

  // Dashboard with 3-column grid
  let h = '<div class="dash">';

  // Col 1: Market overview
  h += '<div style="display:flex;flex-direction:column;gap:12px">';

  // Market breadth
  h += '<div class="card"><h3>市场情绪</h3>';
  h += '<div class="stat-grid">';
  h += '<div class="stat-item"><div class="v" style="color:' + (breadth>50?'#22c55e':'#ef4444') + '">' + upCount + '/' + sectors.length + '</div><div class="l">涨跌比</div></div>';
  h += '<div class="stat-item"><div class="v">' + breadth.toFixed(0) + '%</div><div class="l">广度</div></div>';
  h += '<div class="stat-item"><div class="v up">' + (top3[0]?top3[0][1].current.toFixed(1)+'%':'—') + '</div><div class="l">领涨 ' + (top3[0]?top3[0][0]:'') + '</div></div>';
  h += '<div class="stat-item"><div class="v down">' + (bot3[0]?bot3[0][1].current.toFixed(1)+'%':'—') + '</div><div class="l">领跌 ' + (bot3[0]?bot3[0][0]:'') + '</div></div>';
  h += '</div></div>';

  // Portfolio snapshot
  if (pfData?.holdings) {
    h += '<div class="card"><h3>持仓快照</h3>';
    pfData.holdings.forEach(hh => {
      const cls = hh.pnl > 0 ? 'up' : 'down';
      h += '<div class="row"><span class="name">' + hh.name + '</span><span class="val ' + cls + '">' + (hh.pnl>0?'+':'') + hh.pnl.toFixed(1) + '%</span></div>';
    });
    h += '</div>';
  }

  h += '</div>'; // end col 1

  // Col 2: Sector heatmap
  h += '<div class="card"><h3>板块涨跌</h3>';
  const top6 = sectors.slice(0,6); const bot6 = sectors.slice(-6).reverse();
  for (const [n,s] of top6) {
    h += '<div class="row"><span class="name">' + n + '</span><span class="val up">+' + s.current.toFixed(1) + '%</span></div>';
  }
  h += '<div style="height:8px;border-bottom:1px solid var(--hairline);margin:4px 0"></div>';
  for (const [n,s] of bot6) {
    h += '<div class="row"><span class="name">' + n + '</span><span class="val down">' + s.current.toFixed(1) + '%</span></div>';
  }
  h += '</div>';

  // Col 3: Analysis + Alerts
  h += '<div style="display:flex;flex-direction:column;gap:12px">';

  if (pfData?.analysis) {
    const a = pfData.analysis;
    h += '<div class="card analysis"><h3>🧠 市场研判</h3>';
    h += '<p>' + a.market + '</p>';
    if (a.risk) h += '<div class="risk">⚠️ ' + a.risk + '</div>';
    if (a.actions?.length) {
      h += '<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">';
      a.actions.forEach(ac => { h += '<span style="font-size:11px;padding:3px 8px;border-radius:4px;border:1px solid var(--hairline);color:var(--body)">' + ac + '</span>'; });
      h += '</div>';
    }
    h += '</div>';
  }

  // Alerts
  if (sectorData?.alerts?.length) {
    const recent = sectorData.alerts.slice(-12).reverse();
    h += '<div class="card"><h3>🔔 异动记录</h3>';
    recent.forEach(a => {
      const isUp = ['🔥','⚡','🚀'].some(e => a.msg.startsWith(e));
      h += '<div style="font-size:11px;padding:3px 0;color:' + (isUp?'#22c55e':'#ef4444') + '"><span style="font-family:mono;font-size:10px;color:var(--muted);margin-right:6px">' + a.time + '</span>' + a.msg + '</div>';
    });
    h += '</div>';
  }

  h += '</div></div>'; // end col 3 + dash grid

  // Full-width chart at bottom
  const volatile = sectors.filter(([,s]) => Math.abs(s.current) > 1);
  const chartSectors = volatile.length >= 4 ? volatile.slice(0,4).concat(volatile.slice(-4)) : sectors.slice(0,3).concat(sectors.slice(-3));
  let maxTimes = [];
  chartSectors.forEach(([,s]) => { if (s.history.length > maxTimes.length) maxTimes = s.history.map(h => h.time); });
  if (maxTimes.length > 1) {
    h += '<div class="card" style="margin-top:12px"><h3>📈 异动板块日内走势</h3><canvas id="chart" style="max-height:320px"></canvas></div>';
  }

  document.getElementById('content').innerHTML = h;

  if (maxTimes.length > 1) {
    setTimeout(() => {
      const COLORS = ['#faff69','#22c55e','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899'];
      const ds = chartSectors.map(([name, s], i) => {
        const m = {}; s.history.forEach(h => m[h.time] = h.chg);
        return { label: name, data: maxTimes.map(t => m[t] ?? null), borderColor: COLORS[i], borderWidth: 1.5, pointRadius: 0, tension: 0.3 };
      });
      new Chart(document.getElementById('chart'), {
        type: 'line', data: { labels: maxTimes, datasets: ds },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position:'bottom', labels:{color:'#888',font:{size:10},boxWidth:10,padding:6} } }, scales: { x: { ticks:{color:'#555',font:{size:9}}, grid:{color:'#1a1a1a'} }, y: { ticks:{color:'#555',font:{size:9},callback:v=>v+'%'}, grid:{color:'#1a1a1a'} } } }
      });
    }, 100);
  }
}

load();
setInterval(load, 120000);
</script>
</body>
</html>
