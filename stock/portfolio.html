<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas ｜ 持仓管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
  .lock-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 60vh; gap: 16px;
  }
  .lock-screen h2 { font-size: 20px; color: var(--ink); }
  .lock-screen p { font-size: 13px; color: var(--muted); }
  .lock-input {
    background: var(--surface-card); border: 1px solid var(--hairline);
    color: var(--ink); font-size: 18px; padding: 10px 16px; border-radius: 8px;
    width: 200px; text-align: center; font-family: 'JetBrains Mono',monospace;
    letter-spacing: 4px;
  }
  .lock-input:focus { outline: none; border-color: var(--primary); }
  .lock-btn {
    background: var(--primary); color: #000; border: none;
    padding: 10px 32px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .lock-btn:hover { opacity: 0.85; }
  .lock-err { font-size: 12px; color: var(--accent-rose); min-height: 18px; }

  .updated { font-size: 11px; color: var(--muted-soft); margin-bottom: 20px; }

  /* Market card */
  .mkt-card {
    background: var(--surface-card); border: 1px solid var(--hairline);
    border-radius: 12px; padding: 16px; margin-bottom: 20px;
  }
  .mkt-card h3 { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 8px; }
  .mkt-dir { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
  .mkt-tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .mkt-tag { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 500; }
  .mkt-tag.up { background: rgba(34,197,94,0.1); color: var(--accent-emerald); }
  .mkt-tag.down { background: rgba(239,68,68,0.1); color: var(--accent-rose); }

  /* Holding card */
  .holding-card {
    background: var(--surface-card); border: 1px solid var(--hairline);
    border-radius: 12px; padding: 16px; margin-bottom: 12px;
  }
  .holding-card.danger { border-left: 3px solid #ef4444; }
  .holding-card.warn  { border-left: 3px solid #f59e0b; }
  .holding-card.ok    { border-left: 3px solid #22c55e; }

  .hc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .hc-name { font-size: 16px; font-weight: 700; color: var(--ink); }
  .hc-code { font-size: 11px; color: var(--muted-soft); font-family: 'JetBrains Mono',monospace; margin: 0 8px; }
  .hc-sector {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 4px;
    background: rgba(59,130,246,0.1); color: #60a5fa;
  }
  .hc-health {
    font-size: 11px; font-weight: 700; color: #fff;
    padding: 3px 10px; border-radius: 6px; white-space: nowrap;
  }

  .hc-metrics {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 6px; margin-bottom: 10px;
  }
  .hc-metric {
    background: rgba(255,255,255,0.03); border-radius: 6px;
    padding: 8px 10px; text-align: center;
  }
  .hc-metric .label { font-size: 10px; color: var(--muted); display: block; margin-bottom: 2px; }
  .hc-metric .value {
    font-family: 'JetBrains Mono',monospace; font-size: 14px; font-weight: 700; color: var(--ink);
  }
  .hc-metric .value.up { color: var(--accent-emerald); }
  .hc-metric .value.down { color: var(--accent-rose); }
  .hc-metric .value.muted { color: var(--muted); }

  .hc-action {
    font-size: 13px; color: var(--body); line-height: 1.5;
    padding: 8px 12px; background: rgba(250,255,105,0.04);
    border: 1px solid rgba(250,255,105,0.1); border-radius: 6px;
  }
  .hc-alert {
    font-size: 11px; margin-top: 8px; padding: 6px 10px; border-radius: 6px;
    background: rgba(239,68,68,0.08); color: var(--accent-rose);
  }

  /* Analysis card */
  .ana-card {
    background: linear-gradient(135deg, rgba(250,255,105,0.05), rgba(250,255,105,0.01));
    border: 1px solid rgba(250,255,105,0.12); border-radius: 12px;
    padding: 18px; margin-bottom: 16px;
  }
  .ana-card h3 { font-size: 15px; color: var(--ink); margin-bottom: 8px; }
  .ana-card .ana-body { font-size: 13px; color: var(--body); line-height: 1.7; }
  .ana-card .ana-actions { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .ana-tag {
    display: inline-block; font-size: 11px; font-weight: 600; padding: 4px 10px;
    border-radius: 6px; background: rgba(250,255,105,0.08);
    color: var(--primary); border: 1px solid rgba(250,255,105,0.15);
  }
  .ana-risk { margin-top: 10px; font-size: 12px; color: var(--accent-rose); }

  /* Watchlist */
  .wl-card {
    background: var(--surface-card); border: 1px solid var(--hairline);
    border-radius: 12px; padding: 14px; margin-bottom: 8px;
  }
  .wl-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .wl-row:last-child { border-bottom: none; }
  .wl-name { font-size: 13px; font-weight: 500; color: var(--body); min-width: 64px; }
  .wl-price { font-family: 'JetBrains Mono',monospace; font-size: 13px; color: var(--ink); }
  .wl-chg { font-family: 'JetBrains Mono',monospace; font-size: 12px; }
  .wl-chg.up { color: var(--accent-emerald); }
  .wl-chg.down { color: var(--accent-rose); }
  .wl-note { font-size: 11px; color: var(--muted); margin-left: auto; text-align: right; max-width: 200px; }

  @media (max-width: 480px) {
    .holding-card { padding: 14px; }
    .hc-metrics { grid-template-columns: repeat(3, 1fr); }
    .hc-metric .value { font-size: 12px; }
    .hc-name { font-size: 14px; }
    .ana-tag { font-size: 10px; padding: 3px 7px; }
  }
</style>
<script src="../header.js"></script>
</head>
<body>

<div class="main" id="main"></div>
<footer class="footer">Atlas<span style="color:var(--muted-soft);font-weight:400;"> AI · A股</span></footer>

<script>
const PASSWORD = '223388';

function getToday() { const d = new Date(); return d.toISOString().slice(0,10); }

function renderLock() {
  return `<div class="lock-screen">
    <h2>🔒 持仓管理</h2>
    <p>请输入访问密码</p>
    <input type="password" class="lock-input" id="pwInput" maxlength="12" placeholder="······" autofocus>
    <button class="lock-btn" onclick="unlock()">解锁</button>
    <div class="lock-err" id="lockErr"></div>
  </div>`;
}

function unlock() {
  const val = document.getElementById('pwInput').value;
  if (val === PASSWORD) {
    sessionStorage.setItem('pf_unlocked', '1');
    load();
  } else {
    document.getElementById('lockErr').textContent = '密码错误，请重试';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

async function load() {
  if (sessionStorage.getItem('pf_unlocked') !== '1') {
    document.getElementById('main').innerHTML = renderLock();
    setTimeout(() => document.getElementById('pwInput')?.focus(), 100);
    return;
  }

  let data;
  try {
    const r = await fetch(`../data/stock/portfolio.json`);
    data = await r.json();
  } catch(e) {
    document.getElementById('main').innerHTML = '<div class="updated">数据加载失败，请稍后再试</div>';
    return;
  }

  let html = '<div class="updated">更新于 ' + (data.updated || '--') + '</div>';

  // Market direction
  if (data.market) {
    html += `<div class="mkt-card">
      <h3>📊 市场方向</h3>
      <div class="mkt-dir">${data.market.direction}</div>
      <div class="mkt-tags">
        ${(data.market.top_sectors||[]).map(s => `<span class="mkt-tag up">🔥 ${s}</span>`).join('')}
        ${(data.market.worst_sectors||[]).map(s => `<span class="mkt-tag down">🔻 ${s}</span>`).join('')}
      </div>
    </div>`;
  }

  // Portfolio Analysis
  if (data.analysis) {
    const a = data.analysis;
    html += `<div class="ana-card">
      <h3>🧠 持仓分析 · ${a.verdict || ''}</h3>
      ${a.market ? `<div class="ana-body"><b>市场：</b>${a.market}</div>` : ''}
      ${a.portfolio ? `<div class="ana-body" style="margin-top:4px"><b>持仓：</b>${a.portfolio}</div>` : ''}
      ${a.actions?.length ? `<div class="ana-actions">${a.actions.map(x => `<span class="ana-tag">${x}</span>`).join('')}</div>` : ''}
      ${a.risk ? `<div class="ana-risk">⚠ ${a.risk}</div>` : ''}
    </div>`;
  }

  // Holdings
  if (data.holdings?.length > 0) {
    html += '<h3 style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:10px;">💼 当前持仓</h3>';
    
    // Sort: worst PnL first
    const sorted = [...data.holdings].sort((a,b) => (a.pnl||0) - (b.pnl||0));
    
    for (const h of sorted) {
      const pnl = h.pnl || 0;
      const cardCls = pnl < -8 ? 'danger' : pnl < -3 ? 'warn' : 'ok';
      const healthColor = pnl < -8 ? '#ef4444' : pnl < -3 ? '#f59e0b' : '#22c55e';
      const healthLabel = pnl < -8 ? '⚠ 危险' : pnl < -3 ? '● 关注' : '✓ 健康';
      
      const sign = (h.chg||0) > 0 ? '+' : '';
      const chgCls = (h.chg||0) > 0 ? 'up' : 'down';
      const pnlSign = pnl > 0 ? '+' : '';
      const pnlCls = pnl > 0 ? 'up' : 'down';
      
      html += `<div class="holding-card ${cardCls}">
        <div class="hc-top">
          <div>
            <span class="hc-name">${h.name}</span>
            <span class="hc-code">${h.code}</span>
            <span class="hc-sector">${h.sector || '—'}</span>
          </div>
          <span class="hc-health" style="background:${healthColor}">${healthLabel}</span>
        </div>
        <div class="hc-metrics">
          <div class="hc-metric"><span class="label">成本</span><span class="value">${h.cost || '—'}</span></div>
          <div class="hc-metric"><span class="label">现价</span><span class="value">${(h.price||0).toFixed(2)}</span></div>
          <div class="hc-metric"><span class="label">今日</span><span class="value ${chgCls}">${sign}${(h.chg||0).toFixed(2)}%</span></div>
          <div class="hc-metric"><span class="label">盈亏</span><span class="value ${pnlCls}">${pnlSign}${pnl.toFixed(1)}%</span></div>
          <div class="hc-metric"><span class="label">RSI</span><span class="value muted">${h.rsi != null ? h.rsi : '—'}</span></div>
          <div class="hc-metric"><span class="label">仓位</span><span class="value muted">${h.position || '—'}</span></div>
        </div>
        <div class="hc-action">💡 ${h.action || '持有观察'}</div>
        ${h.alert ? `<div class="hc-alert">⚠ ${h.alert}</div>` : ''}
      </div>`;
    }
  }

  // Watchlist
  if (data.watchlist?.length > 0) {
    html += '<h3 style="font-size:13px;font-weight:600;color:var(--muted);margin:20px 0 10px;">👀 观察列表</h3>';
    html += '<div class="wl-card">';
    for (const w of data.watchlist) {
      const sign = (w.chg||0) > 0 ? '+' : '';
      const chgCls = (w.chg||0) > 0 ? 'up' : 'down';
      html += `<div class="wl-row">
        <span class="wl-name">${w.name}</span>
        <span class="wl-price">${(w.price||0).toFixed(2)}</span>
        <span class="wl-chg ${chgCls}">${sign}${(w.chg||0).toFixed(1)}%</span>
        <span style="font-size:10px;color:var(--muted-soft);">RSI ${w.rsi != null ? w.rsi : '—'}</span>
        <span class="wl-note">${w.note}</span>
      </div>`;
    }
    html += '</div>';
  }

  // Logout
  html += `<div style="text-align:center;margin-top:24px;">
    <button onclick="sessionStorage.removeItem('pf_unlocked');load();" 
      style="background:transparent;border:1px solid var(--hairline);color:var(--muted);padding:6px 16px;border-radius:6px;font-size:12px;cursor:pointer;">
      🔒 锁定页面
    </button>
  </div>`;

  document.getElementById('main').innerHTML = html;
}

load();
</script>
</body>
</html>
