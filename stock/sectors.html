<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Atlas AI · 板块资金流</title>
<link rel="stylesheet" href="../style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  .tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid var(--hairline); }
  .tabs button { padding: 10px 24px; border: none; background: none; color: var(--muted); font-size: 14px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; }
  .tabs button.on { color: var(--primary); border-bottom-color: var(--primary); }

  .chart-box { background: var(--surface-card); border: 1px solid var(--hairline); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  .chart-box h3 { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .chart-box canvas { max-height: 450px; }

  .ai-box { background: linear-gradient(135deg, rgba(250,255,105,0.04), rgba(250,255,105,0.01)); border: 1px solid rgba(250,255,105,0.15); border-radius: 10px; padding: 20px; margin-top: 16px; }
  .ai-box h3 { font-size: 14px; color: var(--primary); margin-bottom: 10px; }
  .ai-box p { font-size: 13px; color: var(--body); line-height: 1.7; margin: 6px 0; }
  .ai-box .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin: 0 2px; }
  .ai-box .tag.in { background: rgba(34,197,94,0.12); color: #22c55e; }
  .ai-box .tag.out { background: rgba(239,68,68,0.12); color: #ef4444; }

  .stat-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-card { background: var(--surface-card); border: 1px solid var(--hairline); border-radius: 8px; padding: 14px 18px; text-align: center; flex: 1; min-width: 120px; }
  .stat-card .v { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono',monospace; }
  .stat-card .l { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .detail-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  .detail-table th { text-align: left; font-size: 10px; text-transform: uppercase; color: var(--muted-soft); padding: 8px 12px; border-bottom: 1px solid var(--hairline); }
  .detail-table td { padding: 6px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 12px; }
  .detail-table .mono { font-family: 'JetBrains Mono',monospace; }

  @media (max-width: 640px) {
    .stat-card { padding: 10px 12px; min-width: 80px; }
    .stat-card .v { font-size: 16px; }
  }
</style>
</head>
<body>
<script src="../header.js"></script>
<div class="main">
  <div class="page-header"><h1>板块资金流</h1><span style="font-size:11px;color:var(--muted-soft)" id="updated"></span></div>

  <div class="tabs">
    <button class="on" data-tab="intra">日内涨跌</button>
    <button data-tab="daily">每日资金流</button>
  </div>

  <div id="content"></div>
</div>

<script>
var INTRADAY = null; // today's sector ETF data (5-min snapshots)
var FUND = {};       // { date: fund_flows data }

var TAB = 'intra';
var COLORS = ['#faff69','#22c55e','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#84cc16','#f97316'];

async function load() {
  const today = new Date();
  const dateStr = today.toISOString().slice(0,10);
  
  // Load intraday ETF data
  try {
    const r = await fetch('../data/stock/sectors-' + dateStr + '.json');
    if (r.ok) INTRADAY = await r.json();
  } catch(e) {}
  
  // Load fund flow data for past 10 trading days
  const dates = [];
  for (let i = 14; i >= 0; i--) {
    const d = new Date(today - i*86400000);
    if (d.getDay() === 0 || d.getDay() === 6) continue;
    dates.push(d.toISOString().slice(0,10));
  }
  for (const d of dates) {
    try {
      const r = await fetch('../data/stock/fund_flows-' + d + '.json');
      if (r.ok) FUND[d] = await r.json();
    } catch(e) {}
  }
  
  document.getElementById('updated').textContent = (INTRADAY?.updated || '') + ' · 资金流' + Object.keys(FUND).length + '天';
  render();
}

function render() {
  if (TAB === 'intra') renderIntra();
  else renderDaily();
}

// ═══════════ 日内涨跌 ═══════════
function renderIntra() {
  if (!INTRADAY) {
    document.getElementById('content').innerHTML = '<div class="loading">暂无今日数据（交易时段13:00起更新）</div>';
    return;
  }
  
  const sectors = Object.entries(INTRADAY.sectors).sort((a,b) => b[1].current - a[1].current);
  
  // Stats
  const upCount = sectors.filter(([,s]) => s.current > 0).length;
  const top3 = sectors.slice(0, 3);
  const bot3 = sectors.slice(-3);
  
  // Pick top 6 volatile sectors for chart
  const volatile = sectors.filter(([,s]) => Math.abs(s.current) > 1);
  const chartSectors = volatile.length >= 6 ? volatile.slice(0, 3).concat(volatile.slice(-3)) : sectors.slice(0, 3).concat(sectors.slice(-3));
  
  // Shared time axis
  let maxTimes = [];
  chartSectors.forEach(([,s]) => { if (s.history.length > maxTimes.length) maxTimes = s.history.map(h => h.time); });
  
  let h = '<div class="stat-row">';
  h += '<div class="stat-card"><div class="v" style="color:#22c55e">' + upCount + '</div><div class="l">上涨板块</div></div>';
  h += '<div class="stat-card"><div class="v" style="color:#ef4444">' + (sectors.length-upCount) + '</div><div class="l">下跌板块</div></div>';
  h += '<div class="stat-card"><div class="v" style="color:var(--ink)">' + top3.map(([n])=>n).join('/') + '</div><div class="l">领涨</div></div>';
  h += '<div class="stat-card"><div class="v" style="color:var(--muted)">' + bot3.map(([n])=>n).join('/') + '</div><div class="l">领跌</div></div>';
  h += '</div>';
  
  // Multi-line chart of volatile sectors
  if (maxTimes.length > 1) {
    h += '<div class="chart-box"><h3>📈 日内涨跌走势（波动最大板块）</h3><canvas id="intraChart"></canvas></div>';
  }
  
  // All sectors table
  h += '<div class="chart-box"><h3>📋 全部板块实时涨跌</h3><table class="detail-table"><thead><tr><th>板块</th><th>涨跌幅</th><th>日内高</th><th>日内低</th><th>振幅</th></tr></thead><tbody>';
  sectors.forEach(([name, s]) => {
    const hist = s.history || [];
    const hi = hist.length ? Math.max(...hist.map(h => h.chg)) : s.current;
    const lo = hist.length ? Math.min(...hist.map(h => h.chg)) : s.current;
    h += '<tr>';
    h += '<td style="font-weight:600;color:var(--ink)">' + name + '</td>';
    h += '<td class="mono" style="font-weight:700;color:' + (s.current>0?'#22c55e':'#ef4444') + '">' + (s.current>0?'+':'') + s.current.toFixed(2) + '%</td>';
    h += '<td class="mono" style="color:var(--muted)">' + (hi>0?'+':'') + hi.toFixed(2) + '%</td>';
    h += '<td class="mono" style="color:var(--muted)">' + (lo>0?'+':'') + lo.toFixed(2) + '%</td>';
    h += '<td class="mono">' + (hi-lo).toFixed(2) + '%</td></tr>';
  });
  h += '</tbody></table></div>';
  
  document.getElementById('content').innerHTML = h;
  
  // Draw chart
  if (maxTimes.length > 1) {
    setTimeout(() => {
      const datasets = chartSectors.map(([name, s], i) => {
        const hm = {}; s.history.forEach(h => hm[h.time] = h.chg);
        return { label: name, data: maxTimes.map(t => hm[t] ?? null), borderColor: COLORS[i], borderWidth: 1.5, pointRadius: 0, tension: 0.3 };
      });
      new Chart(document.getElementById('intraChart'), {
        type: 'line', data: { labels: maxTimes, datasets },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#888', font: { size: 10 }, boxWidth: 10, padding: 8 } } }, scales: { x: { ticks: { color: '#555', font: { size: 9 } }, grid: { color: '#1a1a1a' } }, y: { ticks: { color: '#555', font: { size: 9 }, callback: v=>v+'%' }, grid: { color: '#1a1a1a' } } } }
      });
    }, 100);
  }
}

// ═══════════ 每日资金流 ═══════════
function renderDaily() {
  const dates = Object.keys(FUND).sort();
  if (!dates.length) {
    document.getElementById('content').innerHTML = '<div class="loading">暂无资金流数据（13:00开盘后开始采集）</div>';
    return;
  }
  
  const today = dates[dates.length-1];
  const td = FUND[today];
  const sectors = Object.entries(td.sectors).sort((a,b) => b[1].fund_flow - a[1].fund_flow);
  
  const totalIn = sectors.filter(([,s]) => s.fund_flow > 0).reduce((sum,[,s]) => sum + s.fund_flow, 0);
  const totalOut = sectors.filter(([,s]) => s.fund_flow < 0).reduce((sum,[,s]) => sum + s.fund_flow, 0);
  
  // Stats
  let h = '<div class="stat-row">';
  h += '<div class="stat-card"><div class="v" style="color:#22c55e">+' + totalIn.toFixed(0) + '亿</div><div class="l">主力净流入</div></div>';
  h += '<div class="stat-card"><div class="v" style="color:#ef4444">' + totalOut.toFixed(0) + '亿</div><div class="l">主力净流出</div></div>';
  h += '<div class="stat-card"><div class="v" style="color:var(--ink)">' + (totalIn + totalOut).toFixed(0) + '亿</div><div class="l">净流向</div></div>';
  h += '</div>';
  
  // Daily bar chart - today's fund flow
  h += '<div class="chart-box"><h3>📊 今日主力资金净流入（亿元）</h3><canvas id="flowChart"></canvas></div>';
  
  // AI analysis
  h += renderAI(sectors, dates);
  
  document.getElementById('content').innerHTML = h;
  
  // Chart
  setTimeout(() => {
    const top20 = sectors.slice(0, 20).concat(sectors.slice(-10)).sort((a,b) => b[1].fund_flow - a[1].fund_flow);
    new Chart(document.getElementById('flowChart'), {
      type: 'bar',
      data: { labels: top20.map(([n])=>n), datasets: [{ data: top20.map(([,s])=>s.fund_flow), backgroundColor: top20.map(([,s]) => s.fund_flow>0?'rgba(34,197,94,0.7)':'rgba(239,68,68,0.7)'), borderRadius: 4 }] },
      options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#555', callback: v=>v+'亿' }, grid: { color: '#1a1a1a' } }, y: { ticks: { color: '#888', font: { size: 10 } }, grid: { display: false } } } }
    });
  }, 100);
}

function renderAI(sectors, dates) {
  const top5 = sectors.slice(0, 5);
  const bot5 = sectors.slice(-5);
  const totalIn = sectors.filter(([,s]) => s.fund_flow > 0).reduce((s,[,v])=>s+v.fund_flow,0);
  const totalOut = sectors.filter(([,s]) => s.fund_flow < 0).reduce((s,[,v])=>s+v.fund_flow,0);
  const net = totalIn + totalOut;
  
  // Find persistent inflow sectors (3+ days)
  let persistent = [];
  if (dates.length >= 3) {
    Object.keys(FUND[dates[dates.length-1]].sectors).forEach(name => {
      let count = 0;
      for (let i = dates.length-1; i >= 0; i--) {
        const s = FUND[dates[i]]?.sectors[name];
        if (s && s.fund_flow > 0) count++; else break;
      }
      if (count >= 3) persistent.push(name);
    });
  }
  
  // Find rotation: sectors gaining momentum vs losing
  const gaining = sectors.filter(([,s]) => s.fund_flow > 3 && s.current > 0);
  const losing = sectors.filter(([,s]) => s.fund_flow < -3);
  
  let h = '<div class="ai-box"><h3>🧠 AI 资金去向分析</h3>';
  
  // Overall
  h += '<p><b>今日市场资金：</b>';
  if (net > 20) h += '🟢 大幅净流入，市场偏暖。';
  else if (net > 0) h += '🟢 小幅净流入，谨慎乐观。';
  else if (net > -20) h += '🔴 小幅净流出，观望为主。';
  else h += '🔴 大幅净流出，防御姿态。';
  h += '</p>';
  
  // Where money is going
  h += '<p><b>资金集中流入：</b>';
  gaining.forEach(([n,s]) => { h += '<span class="tag in">' + n + ' +' + s.fund_flow.toFixed(1) + '亿</span> '; });
  h += '</p>';
  
  h += '<p><b>资金撤离：</b>';
  losing.forEach(([n,s]) => { h += '<span class="tag out">' + n + ' ' + s.fund_flow.toFixed(1) + '亿</span> '; });
  h += '</p>';
  
  // Persistent
  if (persistent.length) {
    h += '<p><b>📈 持续流入板块：</b>' + persistent.map(n => '<span class="tag in">' + n + '</span>').join(' ') + ' — 趋势延续概率高，重点关注。</p>';
  }
  
  // Recommendation
  h += '<p><b>💡 操作建议：</b>';
  if (gaining.length >= 3 && net > 0) {
    h += '资金面偏暖，' + gaining.slice(0,3).map(([n]) => n).join('、') + ' 是今日主战场。建议在这些板块中找技术买点。';
  } else if (losing.length >= 5) {
    h += '资金大面积撤离，不宜开新仓。持有仓位的' + losing.slice(0,3).map(([n]) => n).join('、') + ' 相关标的注意风险。';
  } else {
    h += '资金面分化，无明确主线。观望等方向明朗。';
  }
  h += '</p>';
  
  if (dates.length < 5) {
    h += '<p style="font-size:11px;color:var(--muted-soft)">⚠️ 资金流数据仅' + dates.length + '天，随数据积累分析会更准确</p>';
  }
  
  h += '</div>';
  return h;
}

document.querySelector('.tabs').addEventListener('click', function(e) {
  if (e.target.tagName !== 'BUTTON') return;
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('on'));
  e.target.classList.add('on');
  TAB = e.target.dataset.tab;
  render();
});

load();
setInterval(load, 120000);
</script>
</body>
</html>
