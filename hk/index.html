<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;510;590<meta charset="UTF-8">family=JetBrains+Mono:wght@400;500;600<meta charset="UTF-8">display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Atlas Terminal В· жёҜиӮЎж·ұеәҰ</title>
<link rel="stylesheet" href="../css/terminal.css">
</head>
<body>
<div id="app"><div style="padding:40px;text-align:center;color:var(--muted)">еҠ иҪҪдёӯ...</div></div>
<script src="../js/terminal.js"></script>
<script>
T.loadPage({
  activeTab: 'hk',
  rootId: 'app',
  dataPath: '../data/hk/market.json',
  render: function(hkData, overview) {

    var html = '';
    html += '<a class="back-link" href="../index.html">вҶҗ иҝ”еӣһе…ЁеұҖ</a>';

    // в”Җв”Җв”Җ 1. жҒ’з”ҹжҢҮж•°е®һж—¶ в”Җв”Җв”Җ
    if (hkData && hkData.index) {
      var idx = hkData.index;
      var idxColor = idx.chg_pct >= 0 ? 'var(--up)' : 'var(--down)';
      html += '<div class="card">'+
        '<div class="card-title">рҹҮӯрҹҮ° жҒ’з”ҹжҢҮж•° В· е®һж—¶</div>'+
        '<div class="card-val" style="color:'+idxColor+'">'+idx.price.toLocaleString('en-US')+'</div>'+
        '<div class="card-sub">'+
          '<span style="color:'+idxColor+';font-weight:600">'+(idx.chg_pct>=0?'+':'')+idx.chg_pct.toFixed(2)+'%</span>'+
          ' ж¶Ёи·Ң '+idx.chg.toFixed(2)+
        '</div>'+
        '<div style="font-size:10px;color:var(--muted);margin-top:4px">ж•°жҚ®жқҘжәҗ: и…ҫи®ҜqtиЎҢжғ… В· '+(hkData.updated||'вҖ”')+'</div>'+
        '</div>';

      // в”Җв”Җв”Җ 2. жҒ’з”ҹз§‘жҠҖ + жқҝеқ— в”Җв”Җв”Җ
      if (overview && overview.indices && overview.indices.a) {
        var kc50 = overview.indices.a.find(function(x){return x.name==='з§‘еҲӣ50';});
        if (kc50) {
          html += '<div class="card">'+
            '<div class="card-title">рҹ“Ҡ жҒ’з”ҹз§‘жҠҖ vs AиӮЎз§‘еҲӣ50</div>'+
            '<div class="row2">'+
              '<div class="idx-mini"><div class="name">жҒ’з”ҹз§‘жҠҖ</div><div class="val" style="color:'+idxColor+'">'+idx.price+'</div><div class="chg" style="color:'+idxColor+'">'+T.fmtPct(idx.chg_pct)+'</div></div>'+
              '<div class="idx-mini"><div class="name">з§‘еҲӣ50</div><div class="val" style="color:'+(kc50.chg>=0?'var(--up)':'var(--down)')+'">'+kc50.val+'</div><div class="chg" style="color:'+(kc50.chg>=0?'var(--up)':'var(--down)')+'">'+T.fmtPct(kc50.chg)+'</div></div>'+
            '</div>'+
            (idx.chg_pct * kc50.chg > 0 ? '<div class="sowhat">рҹ’Ў жёҜиӮЎдёҺAиӮЎз§‘жҠҖж–№еҗ‘'+(idx.chg_pct>0?'еҗҢжӯҘдёҠж¶Ё':'еҗҢжӯҘдёӢи·Ң')+'вҖ”вҖ”и¶ӢеҠҝзЎ®и®ӨпјҢ'+(idx.chg_pct>0?'еҸҜд»Ҙи·ҹйҡҸ':'и°Ёж…Һи§Ӯжңӣ')+'гҖӮ</div>' : '<div class="sowhat" style="border-left-color:var(--warn)">вҡ  жёҜиӮЎдёҺAиӮЎз§‘жҠҖж–№еҗ‘иғҢзҰ»вҖ”вҖ”еёӮеңәеҲҶжӯ§пјҢиҪ»д»“еҸӮдёҺгҖӮ</div>')+
            '</div>';
        }
      }

    } else {
      html += '<div class="card"><div class="card-title">рҹҮӯрҹҮ° жҒ’з”ҹжҢҮж•°</div>'+T.noData('жёҜиӮЎж•°жҚ®ж”¶йӣҶдёӯ В· зӯүеҫ…и…ҫи®ҜqtиЎҢжғ…cronдә§еҮә')+'</div>';
    }

    // в”Җв”Җв”Җ 3. жёҜиӮЎжҢҒд»“е®һж—¶д»· в”Җв”Җв”Җ
    if (hkData && hkData.watch && hkData.watch.length) {
      var watchHTML = hkData.watch.map(function(w) {
        var c = w.chg_pct >= 0 ? 'var(--up)' : 'var(--down)';
        return '<div class="flow-row">'+
          '<span class="flow-name">'+w.name+' <span style="color:var(--muted);font-size:9px">'+w.code+'</span></span>'+
          '<span style="font-weight:600;font-family:var(--font-mono);color:'+c+'">'+w.price.toFixed(2)+'</span>'+
          '<span style="font-size:10px;color:'+c+'">'+T.fmtPct(w.chg_pct)+'</span>'+
          '</div>';
      }).join('');
      html += '<div class="card">'+
        '<div class="card-title">рҹ’ј жёҜиӮЎжҢҒд»“е®һж—¶д»·</div>'+
        watchHTML +
        '<div style="font-size:9px;color:var(--muted);margin-top:6px">и…ҫи®ҜqtиЎҢжғ… В· '+(hkData.updated||'вҖ”')+'</div>'+
        '</div>';
    }

    // в”Җв”Җв”Җ 4. еҚ—еҗ‘иө„йҮ‘ (еҰӮжһңжңү) в”Җв”Җв”Җ
    if (hkData && hkData.southbound) {
      var sb = hkData.southbound;
      var sbColor = sb.net_flow >= 0 ? 'var(--up)' : 'var(--down)';
      html += '<div class="card">'+
        '<div class="card-title">рҹ’° еҚ—еҗ‘иө„йҮ‘</div>'+
        '<div class="card-val" style="font-size:18px;color:'+sbColor+'">'+(sb.net_flow>=0?'вҶ‘':'вҶ“')+' еҮҖжөҒе…Ҙ '+(sb.net_flow||0).toFixed(1)+'дәҝжёҜе…ғ</div>'+
        (sb.trend_days ? '<div class="card-sub">иҝһз»ӯ'+(sb.trend_days||0)+'ж—ҘеҮҖжөҒе…Ҙ</div>' : '')+
        (sb.top_buys ? '<div style="margin-top:6px;font-size:10px;color:var(--ink-soft)">дё»иҰҒд№°е…Ҙ: '+(sb.top_buys||[]).join(' / ')+'</div>' : '')+
        '<div class="sowhat">рҹ’Ў еҚ—еҗ‘иө„йҮ‘жҢҒз»ӯд№°е…ҘвҶ’жёҜиӮЎжңүиө„йҮ‘ж”Ҝж’‘пјҢи·ҹд№°дҝЎеҸ·гҖӮ</div>'+
        '</div>';
    }

    // в”Җв”Җв”Җ 5. жёҜиӮЎжҢҒд»“дҝЎеҸ· в”Җв”Җв”Җ
    if (overview && overview.holdings && overview.holdings.hk && overview.holdings.hk.length) {
      var hkHolds = overview.holdings.hk;
      var holdHTML = hkHolds.map(function(h) {
        var c = h.chg >= 0 ? 'var(--up)' : 'var(--down)';
        var alertIcon = '';
        if (h.pnl_pct < -5) alertIcon = ' рҹ”ҙ';
        else if (h.pnl_pct < -2) alertIcon = ' рҹҹЎ';
        return '<div class="flow-row">'+
          '<span class="flow-name">'+h.sym+'</span>'+
          '<span style="font-family:var(--font-mono);color:'+c+'">'+h.price+'</span>'+
          '<span style="font-size:10px;color:'+c+'">'+T.fmtPct(h.chg)+'</span>'+
          '<span style="font-size:10px;color:'+(h.pnl_pct>=0?'var(--up)':'var(--down)')+'">зӣҲдәҸ '+T.fmtPct(h.pnl_pct)+'</span>'+
          alertIcon+
          '</div>';
      }).join('');
      html += '<div class="card">'+
        '<div class="card-title">рҹ“Ӣ жёҜиӮЎжҢҒд»“иҜҰжғ…</div>'+
        holdHTML +
        '</div>';
    }

    html += '<div class="last-updated">ж•°жҚ®жӣҙж–°: <span id="update-time">'+(overview && overview.updated ? overview.updated : 'вҖ”')+'</span></div>';
    return html;
  }
});
</script>
</body>
</html>
