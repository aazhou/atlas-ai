<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Atlas AI · Quant Dashboard</title>
<link rel="stylesheet" href="../style.css">
<style>
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface-card); border: 1px solid var(--hairline); border-radius: 8px; padding: 18px; }
  .stat-card .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-card .val { font-size: 26px; font-weight: 700; color: var(--ink); font-family: 'JetBrains Mono', monospace; }
  .stat-card .val.up { color: var(--accent-emerald); } .stat-card .val.down { color: var(--accent-rose); }
  .stat-card .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .section-title { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section-title .badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--hairline-strong); color: var(--muted); }
  .section-title .badge.live { background: rgba(34,197,94,0.12); color: #22c55e; }
  .pulse { animation: pulse 2s infinite; } @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; }
  .tag-long { background: rgba(34,197,94,0.12); color: #22c55e; }
  .tag-short { background: rgba(239,68,68,0.12); color: #ef4444; }
  .tag-a { background: rgba(34,197,94,0.12); color: #22c55e; }
  .tag-b { background: rgba(245,158,11,0.12); color: #f59e0b; }
  .tag-c { background: rgba(239,68,68,0.12); color: #ef4444; }
  .empty-state { text-align: center; padding: 40px; color: var(--muted); }
  .row-win td { background: rgba(34,197,94,0.04); }
  .row-loss td { background: rgba(239,68,68,0.04); }

  @media (max-width: 640px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .stat-card .val { font-size: 20px; }
    .picks-table { display: block !important; overflow-x: auto; }
  }
</style>
</head>
<body>
<script src="../header.js"></script>
<div class="main">

  <div class="page-header">
    <h1>Quant Dashboard</h1>
    <span class="round" id="updateTime">---</span>
  </div>

  <!-- Stats Cards -->
  <div class="stats-grid" id="statsGrid"></div>

  <!-- Portfolio Positions -->
  <div class="picks-section" style="margin-top:0">
    <div class="section-title">
      持仓 <span class="badge live pulse" id="posCount">0</span>
    </div>
    <div id="positionsView"><div class="empty-state">无持仓</div></div>
  </div>

  <!-- Live Signals -->
  <div class="picks-section">
    <div class="section-title">
      最新信号 <span class="badge" id="sigCount">0</span>
    </div>
    <div id="signalsView"><div class="empty-state">暂无信号</div></div>
  </div>

  <!-- Best Params (Strategy Config) -->
  <div class="picks-section">
    <div class="section-title">策略配置 · 最优参数</div>
    <div id="paramsView"><div class="empty-state">加载中...</div></div>
  </div>

  <!-- Closed Trades -->
  <div class="picks-section">
    <div class="section-title">已平仓记录</div>
    <div id="tradesView"><div class="empty-state">暂无记录</div></div>
  </div>

</div>

<script>
const BASE = '../data/crypto/';

async function loadJSON(f) {
  try { const r = await fetch(BASE + f); return r.ok ? r.json() : null; }
  catch(e) { return null; }
}

function fmtPct(v) { return (v*100).toFixed(2) + '%'; }
function fmtUSD(v) { return '$' + (v||0).toLocaleString('en-US', {minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtTime(ts) {
  if (!ts) return '---';
  const d = new Date(ts < 1e12 ? ts*1000 : ts);
  return d.toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

async function render() {
  const [pf, sig, params] = await Promise.all([
    loadJSON('portfolio.json'),
    loadJSON('signals.json'),
    loadJSON('best_params_clean.json')
  ]);

  // Stats
  const cap = pf?.capital || 100000;
  const pos = pf?.positions || [];
  const closed = pf?.closed_trades || [];
  const totalPnl = pf ? (pf.positions||[]).reduce((s,p) => s+(p.pnl_pct||0)*p.position_size, 0) +
    (pf.closed_trades||[]).reduce((s,t) => s+(t.pnl_pct||0)*0.2, 0) : 0;
  const wr = closed.length ? closed.filter(t=>t.pnl_pct>0).length / closed.length : 0;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="lbl">总资金</div><div class="val">${fmtUSD(cap)}</div></div>
    <div class="stat-card"><div class="lbl">总盈亏</div><div class="val ${totalPnl>=0?'up':'down'}">${fmtPct(totalPnl)}</div></div>
    <div class="stat-card"><div class="lbl">持仓数</div><div class="val">${pos.length}/3</div></div>
    <div class="stat-card"><div class="lbl">胜率</div><div class="val ${wr>=0.5?'up':'down'}">${(wr*100).toFixed(0)}%</div><div class="sub">${closed.length}笔已平仓</div></div>
    <div class="stat-card"><div class="lbl">更新时间</div><div class="val" style="font-size:16px">${fmtTime(Date.now())}</div></div>
  `;

  // Positions
  document.getElementById('posCount').textContent = pos.length;
  if (pos.length) {
    const rows = pos.map(p => {
      const pnlC = p.pnl_pct >= 0 ? 'up' : 'down';
      return `<tr><td><span class="tag tag-${p.direction.toLowerCase()}">${p.direction}</span></td>
        <td style="font-weight:700;color:var(--ink)">${p.symbol}</td>
        <td>$${p.entry_price}</td><td>$${p.current_price}</td>
        <td class="${pnlC}" style="font-weight:700">${fmtPct(p.pnl_pct)}</td>
        <td style="color:var(--muted);font-size:12px">${fmtTime(p.entry_time)}</td></tr>`;
    }).join('');
    document.getElementById('positionsView').innerHTML = `<table class="picks-table">
      <thead><tr><th>方向</th><th>币种</th><th>入场</th><th>现价</th><th>盈亏</th><th>入场时间</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
  }

  // Signals
  const sigs = sig?.signals || [];
  document.getElementById('sigCount').textContent = sigs.length;
  if (sigs.length) {
    const rows = sigs.slice(0,10).map(s => {
      return `<tr><td><span class="tag tag-${s.direction.toLowerCase()}">${s.direction}</span></td>
        <td style="font-weight:700;color:var(--ink)">${s.symbol}</td>
        <td style="color:var(--ink)">${s.score?.toFixed(2)}</td>
        <td>$${s.entry_price?.toFixed(4)}</td>
        <td style="font-size:11px;color:var(--muted)">${s.strategy}</td>
        <td style="font-size:11px;color:var(--muted)">${s.reason||''}</td></tr>`;
    }).join('');
    document.getElementById('signalsView').innerHTML = `<table class="picks-table">
      <thead><tr><th>方向</th><th>币种</th><th>评分</th><th>入场价</th><th>策略</th><th>原因</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
  }

  // Best Params
  const bpr = params?.results || [];
  if (bpr.length) {
    const rows = bpr.slice(0,10).map(r => {
      const p = r.params || r;
      const g = r.sharpe_ratio >= 1 ? 'a' : (r.sharpe_ratio>0 ? 'b' : 'c');
      return `<tr><td><span class="tag tag-${g}">${r.sharpe_ratio>=1?'A':(r.sharpe_ratio>0?'B':'C')}</span></td>
        <td style="font-weight:700;color:var(--ink)">${r.coin}</td>
        <td>thr=${p.thr||p.threshold} sl=${p.sl||p.sl_pct} tp=${p.tp||p.tp_pct} ${p.h||p.max_hold_hours}h</td>
        <td>${r.total_trades}t</td>
        <td>${(r.win_rate*100).toFixed(0)}%</td>
        <td class="${r.sharpe_ratio>=1?'up':''}">${r.sharpe_ratio?.toFixed(2)}</td>
        <td>${(r.max_drawdown*100).toFixed(1)}%</td></tr>`;
    }).join('');
    document.getElementById('paramsView').innerHTML = `<table class="picks-table">
      <thead><tr><th>评级</th><th>币种</th><th>参数</th><th>交易</th><th>胜率</th><th>夏普</th><th>回撤</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
  }

  // Closed Trades
  if (closed.length) {
    const rows = closed.slice(-20).reverse().map(t => {
      const cls = t.pnl_pct > 0 ? 'row-win' : 'row-loss';
      return `<tr class="${cls}"><td><span class="tag tag-${t.direction?.toLowerCase()||'long'}">${t.direction||'LONG'}</span></td>
        <td style="font-weight:700;color:var(--ink)">${t.symbol}</td>
        <td>$${t.entry_price}</td><td>$${t.exit_price}</td>
        <td class="${t.pnl_pct>=0?'up':'down'}" style="font-weight:700">${fmtPct(t.pnl_pct)}</td>
        <td style="font-size:11px;color:var(--muted)">${t.exit_reason}</td>
        <td style="font-size:11px;color:var(--muted)">${fmtTime(t.exit_time)}</td></tr>`;
    }).join('');
    document.getElementById('tradesView').innerHTML = `<table class="picks-table">
      <thead><tr><th>方向</th><th>币种</th><th>入场</th><th>出场</th><th>盈亏</th><th>原因</th><th>时间</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
  }
}

render();
setInterval(render, 60000);
</script>
</body>
</html>
