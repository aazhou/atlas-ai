<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Atlas AI · 加密回测</title>
<link rel="stylesheet" href="../style.css">
<script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  .strategy-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .strat-card { background: var(--surface-card); border: 1px solid var(--hairline); border-radius: 8px; padding: 16px; cursor: pointer; transition: border-color 0.2s; }
  .strat-card:hover { border-color: var(--primary); }
  .strat-card.active { border-color: var(--primary); background: rgba(250,255,105,0.04); }
  .strat-card .strat-name { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 10px; }
  .strat-card .strat-dir { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
  .strat-card .dir-long { background: rgba(34,197,94,0.12); color: #22c55e; }
  .strat-card .dir-short { background: rgba(239,68,68,0.12); color: #ef4444; }
  .strat-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
  .strat-stat { text-align: center; }
  .strat-stat .val { font-size: 16px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .strat-stat .lbl { font-size: 10px; color: var(--muted); }
  .coin-row { cursor: pointer; }
  .coin-row:hover td { background: rgba(255,255,255,0.02); }
  .coin-row.selected td { background: rgba(250,255,105,0.06); }
  .trade-detail-table { width: 100%; border-collapse: collapse; margin: 8px 0; }
  .trade-detail-table th { font-size: 10px; text-transform: uppercase; color: var(--muted-soft); padding: 6px 10px; border-bottom: 1px solid var(--hairline); }
  .trade-detail-table td { font-size: 11px; padding: 5px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .equity-bar { height: 4px; border-radius: 2px; background: var(--hairline); margin-top: 4px; overflow: hidden; }
  .equity-bar .fill { height: 100%; border-radius: 2px; }
  @media (max-width: 640px) {
    .strategy-cards { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .strat-card { padding: 12px; }
    .strat-stats { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<script src="../header.js"></script>
<div class="main">

  <div class="page-header">
    <h1>策略回测</h1>
    <span class="round" id="updateTime">---</span>
  </div>

  <!-- Strategy Cards -->
  <div class="strategy-cards" id="strategyCards"></div>

  <!-- Table + Chart -->
  <div class="backtest-layout">
    <div class="backtest-left">
      <div class="picks-section" style="margin-top:0;">
        <div class="info-row">
          <span id="stratTitle" style="font-weight:700;color:var(--ink)">选择策略查看详情</span>
          <span class="round" id="coinCount"></span>
        </div>
        <div id="coinView"><div class="loading">选择上方策略卡片</div></div>
      </div>
    </div>

    <div class="backtest-right">
      <div class="chart-panel">
        <div class="chart-panel-header">
          <div class="chart-panel-title" id="chartTitle">选择币种查看K线</div>
          <div class="chart-interval-row" id="intervalRow">
            <button class="chart-int-btn active" data-int="5m">5m</button>
            <button class="chart-int-btn" data-int="15m">15m</button>
            <button class="chart-int-btn" data-int="1h">1h</button>
          </div>
        </div>
        <div class="chart-container" id="chartContainer">
          <div class="chart-placeholder">点击币种行加载K线</div>
        </div>
        <div class="chart-legend">
          <span><span class="dot green"></span>入场</span>
          <span><span class="dot green"></span>止盈</span>
          <span><span class="dot red"></span>止损/超时</span>
        </div>
      </div>
    </div>
  </div>

  <div class="disclaimer">
    基于5m收盘价进出，不含手续费。费率极值: rate<0.05%→LONG / rate>0.05%→SHORT。多因子: 费率P5+4h趋势+K线/量/PA评分>0.18。
  </div>

</div>

<script>
var S = { data: [], groups: {}, activeGroup: null, chartCoin: null, chartInterval: '5m', chart: null, candleSeries: null, chartCache: {}, expanded: {} };

function fmtPct(v) { return (v>=0?'+':'') + v.toFixed(2) + '%'; }
function pnlCls(v) { return v>=0?'up':'down'; }

function groupKey(r) { return r.strategy + '_' + r.direction; }
function groupLabel(key) {
  var parts = key.split('_');
  var s = parts[0] === 'multifactor' ? '多因子' : '费率极值';
  var d = parts[1] === 'LONG' ? '做多' : '做空';
  return s + ' ' + d;
}

// Load data
fetch('../data/crypto/backtest_final.json?' + Date.now())
  .then(function(r) { return r.json(); })
  .then(function(data) {
    S.data = data;
    document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');

    // Group by strategy+direction
    S.groups = {};
    data.forEach(function(r) {
      var k = groupKey(r);
      if (!S.groups[k]) S.groups[k] = [];
      S.groups[k].push(r);
    });

    renderStrategyCards();
    // Auto-select first group
    var keys = Object.keys(S.groups);
    if (keys.length) selectGroup(keys[0]);
  })
  .catch(function(e) {
    document.getElementById('coinView').innerHTML = '<div class="loading">加载失败: ' + e.message + '</div>';
  });

function renderStrategyCards() {
  var keys = Object.keys(S.groups);
  var h = '';
  keys.forEach(function(k) {
    var coins = S.groups[k];
    // Aggregate stats
    var totalTrades = 0, totalWins = 0, sumSharpe = 0, sumPnl = 0;
    var bestSharpe = -99, bestCoin = '';
    coins.forEach(function(c) {
      totalTrades += c.trades;
      totalWins += Math.round(c.trades * c.win_rate / 100);
      sumSharpe += c.sharpe;
      sumPnl += c.total_return;
      if (c.sharpe > bestSharpe && c.trades >= 4) { bestSharpe = c.sharpe; bestCoin = c.symbol; }
    });
    var wr = totalTrades > 0 ? (totalWins / totalTrades * 100) : 0;
    var activeCls = k === S.activeGroup ? ' active' : '';
    var parts = k.split('_');
    var dirCls = parts[1] === 'LONG' ? 'dir-long' : 'dir-short';

    h += '<div class="strat-card' + activeCls + '" data-group="' + k + '" onclick="selectGroup(\'' + k + '\')">';
    h += '<div class="strat-name">' + groupLabel(k) + ' <span class="strat-dir ' + dirCls + '">' + parts[1] + '</span></div>';
    h += '<div class="strat-stats">';
    h += '<div class="strat-stat"><div class="val ' + (sumPnl>=0?'up':'down') + '">' + fmtPct(sumPnl) + '</div><div class="lbl">累计收益</div></div>';
    h += '<div class="strat-stat"><div class="val">' + wr.toFixed(0) + '%</div><div class="lbl">胜率</div></div>';
    h += '<div class="strat-stat"><div class="val">' + totalTrades + '</div><div class="lbl">总交易</div></div>';
    h += '<div class="strat-stat"><div class="val">' + coins.length + '</div><div class="lbl">覆盖币种</div></div>';
    h += '<div class="strat-stat"><div class="val">' + (sumSharpe/coins.length).toFixed(1) + '</div><div class="lbl">均夏普</div></div>';
    h += '<div class="strat-stat"><div class="val" style="color:var(--primary)">' + bestCoin + '</div><div class="lbl">最佳标的</div></div>';
    h += '</div></div>';
  });
  document.getElementById('strategyCards').innerHTML = h;
}

function selectGroup(key) {
  S.activeGroup = key;
  S.expanded = {};
  renderStrategyCards();
  renderCoinList();
}

function renderCoinList() {
  var coins = S.groups[S.activeGroup] || [];
  document.getElementById('stratTitle').textContent = groupLabel(S.activeGroup);
  document.getElementById('coinCount').textContent = coins.length + ' 币种';

  if (!coins.length) {
    document.getElementById('coinView').innerHTML = '<div class="loading">无数据</div>';
    return;
  }

  // Sort by sharpe
  coins.sort(function(a,b) { return b.sharpe - a.sharpe; });

  var h = '<table class="picks-table"><thead><tr>';
  h += '<th style="width:24px"></th><th>币种</th><th>日期</th><th>交易</th><th>胜率</th><th>均收益</th><th>回撤</th><th>夏普</th><th>盈亏比</th><th>累计</th>';
  h += '</tr></thead><tbody>';

  coins.forEach(function(r) {
    var key = r.symbol + '|' + r.strategy + '|' + r.direction;
    var ex = S.expanded[key];
    var sel = S.chartCoin === r.symbol ? ' selected' : '';
    var maxSharpe = r.sharpe > 99 ? '99+' : r.sharpe.toFixed(2);

    h += '<tr class="coin-row' + sel + '" data-coin="' + r.symbol + '" onclick="clickCoin(\'' + r.symbol + '\',\'' + r.strategy + '\')">';
    h += '<td class="bt-expand-btn" data-expand="' + key + '">' + (ex ? '▼' : '▶') + '</td>';
    h += '<td><b class="ink">' + r.symbol + '</b></td>';
    h += '<td style="font-size:11px;color:var(--muted)">' + (r.date_range||'') + '</td>';
    h += '<td class="mono">' + r.trades + '</td>';
    h += '<td class="mono ' + (r.win_rate>=60?'up':'down') + '">' + r.win_rate + '%</td>';
    h += '<td class="mono ' + pnlCls(r.avg_pnl) + '">' + fmtPct(r.avg_pnl) + '</td>';
    h += '<td class="mono ' + (r.max_dd>25?'down':'') + '">' + r.max_dd + '%</td>';
    h += '<td class="mono">' + maxSharpe + '</td>';
    h += '<td class="mono">' + (r.profit_factor||0).toFixed(1) + '</td>';
    h += '<td class="mono ' + pnlCls(r.total_return) + '">' + fmtPct(r.total_return) + '</td>';
    h += '</tr>';

    // Expanded trade details
    if (ex && r.trades_detail && r.trades_detail.length) {
      h += '<tr><td colspan="10" style="padding:0 14px 12px">';
      h += '<table class="trade-detail-table"><thead><tr>';
      h += '<th>#</th><th>入场时间</th><th>出场时间</th><th>入场价</th><th>出场价</th><th>盈亏</th><th>最大浮盈</th><th>最大浮亏</th><th>原因</th>';
      h += '</tr></thead><tbody>';
      r.trades_detail.forEach(function(t,i) {
        var pp = function(v) { return Math.abs(v) < 1 ? v.toFixed(6) : v.toFixed(4); };
        h += '<tr>';
        h += '<td class="mono" style="font-size:10px">' + (i+1) + '</td>';
        h += '<td style="font-size:10px">' + String(t.entry_time||'').substring(5,16) + '</td>';
        h += '<td style="font-size:10px">' + String(t.exit_time||'').substring(5,16) + '</td>';
        h += '<td class="mono" style="font-size:10px">' + pp(t.entry_price) + '</td>';
        h += '<td class="mono" style="font-size:10px">' + pp(t.exit_price) + '</td>';
        h += '<td class="mono ' + (t.pnl_pct>=0?'up':'down') + '" style="font-size:10px">' + (t.pnl_pct>=0?'+':'') + t.pnl_pct.toFixed(2) + '%</td>';
        h += '<td class="mono up" style="font-size:10px">' + (t.max_profit>0?'+'+t.max_profit.toFixed(1)+'%':'—') + '</td>';
        h += '<td class="mono down" style="font-size:10px">' + (t.max_loss<0?t.max_loss.toFixed(1)+'%':'—') + '</td>';
        h += '<td style="font-size:10px">' + (t.exit_reason||'') + '</td>';
        h += '</tr>';
      });
      h += '</tbody></table></td></tr>';
    }
  });

  h += '</tbody></table>';
  document.getElementById('coinView').innerHTML = h;

  // Click delegation
  document.getElementById('coinView').onclick = function(e) {
    var exp = e.target.closest('[data-expand]');
    if (exp) {
      e.stopPropagation();
      S.expanded[exp.dataset.expand] = !S.expanded[exp.dataset.expand];
      renderCoinList();
    }
  };
}

function clickCoin(symbol, strategy) {
  S.chartCoin = symbol;
  document.getElementById('chartTitle').textContent = symbol + ' — ' + (strategy.indexOf('multifactor')>=0?'多因子':'费率极值');
  loadChart(symbol, S.chartInterval, strategy);
  renderCoinList();
}

function loadChart(symbol, interval, strategy) {
  var container = document.getElementById('chartContainer');
  var key = symbol + '_' + interval;

  if (S.chartCache[key]) {
    renderChart(S.chartCache[key], strategy);
    return;
  }

  container.innerHTML = '<div class="chart-placeholder">加载 ' + symbol + ' ' + interval + '...</div>';
  fetch('../data/crypto/chart_' + symbol + '_' + interval + '.json?' + Date.now())
    .then(function(r) { if (!r.ok) throw new Error('404'); return r.json(); })
    .then(function(raw) {
      var prices = raw.prices || raw.klines || [];
      var klines = prices.map(function(p) {
        return { time: p.t || p.time, open: p.o || p.open, high: p.h || p.high, low: p.l || p.low, close: p.c || p.close };
      });
      S.chartCache[key] = { klines: klines, markers: raw.markers || [] };
      if (S.chartCoin === symbol && S.chartInterval === interval) renderChart(S.chartCache[key], strategy);
    })
    .catch(function() {
      if (S.chartCoin === symbol && S.chartInterval === interval)
        container.innerHTML = '<div class="chart-placeholder">暂无K线 — ' + symbol + '</div>';
    });
}

function renderChart(data, strategy) {
  var container = document.getElementById('chartContainer');
  container.innerHTML = '';
  if (S.chart) { S.chart.remove(); S.chart = null; S.candleSeries = null; }

  var fmtPrice = function(v) { return v == null ? '' : Math.abs(v) < 1 ? v.toFixed(6) : v.toFixed(2); };

  S.chart = LightweightCharts.createChart(container, {
    layout: { background: { color: '#1a1a1a' }, textColor: '#cccccc', fontSize: 12 },
    grid: { vertLines: { color: '#2a2a2a' }, horzLines: { color: '#2a2a2a' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#2a2a2a', scaleMargins: { top: 0.1, bottom: 0.1 } },
    timeScale: { borderColor: '#2a2a2a', timeVisible: true, secondsVisible: false, barSpacing: 6 },
    width: container.clientWidth, height: container.clientHeight || 480
  });

  S.candleSeries = S.chart.addCandlestickSeries({
    upColor: '#22c55e', downColor: '#ef4444',
    borderUpColor: '#22c55e', borderDownColor: '#ef4444',
    wickUpColor: '#22c55e', wickDownColor: '#ef4444',
    priceFormat: { type: 'custom', formatter: fmtPrice, minMove: 0.000001 }
  });
  S.candleSeries.setData(data.klines);

  if (data.markers && data.markers.length) {
    var mks = [];
    data.markers.forEach(function(m) {
      if (strategy && m.strategy && m.strategy !== strategy) return;
      var ts = typeof m.time === 'number' ? m.time : Math.floor(new Date(String(m.time).replace(' ','T')+'Z').getTime()/1000);
      if (!ts || !isFinite(ts)) return;
      mks.push({ time: ts, position: m.type==='entry'?'belowBar':'aboveBar',
        color: m.type==='entry'?'#22c55e':(m.pnl>0?'#22c55e':'#ef4444'),
        shape: m.type==='entry'?'arrowUp':'arrowDown', text: m.text||(m.type==='entry'?'▶':'■'), size: 2 });
    });
    if (mks.length) S.candleSeries.setMarkers(mks);
  }

  window._cr = function() { if (S.chart && container) S.chart.applyOptions({ width: container.clientWidth, height: container.clientHeight||480 }); };
  window.removeEventListener('resize', window._cr);
  window.addEventListener('resize', window._cr);
}

document.getElementById('intervalRow').addEventListener('click', function(e) {
  var btn = e.target.closest('.chart-int-btn');
  if (!btn) return;
  var intv = btn.dataset.int;
  if (intv === S.chartInterval) return;
  document.querySelectorAll('.chart-int-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  S.chartInterval = intv;
  if (S.chartCoin) loadChart(S.chartCoin, intv, S.chartStrategy);
});
</script>
</body>
</html>
