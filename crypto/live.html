<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Atlas AI · 加密模拟交易</title>
<link rel="stylesheet" href="../style.css">
<style>
  .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface-card); border: 1px solid var(--hairline); border-radius: 8px; padding: 16px; }
  .stat-card .label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .stat-card .value { font-size: 22px; font-weight: 700; color: var(--ink); font-family: 'JetBrains Mono', monospace; }
  .stat-card .value.up { color: var(--accent-emerald); }
  .stat-card .value.down { color: var(--accent-rose); }
  .strategy-selector { display: flex; gap: 8px; align-items: center; margin-bottom: 20px; }
  .strategy-selector select {
    padding: 8px 14px; border: 1px solid var(--hairline-strong); border-radius: 6px;
    background: var(--surface-card); color: var(--ink); font-size: 14px; font-weight: 600;
    cursor: pointer; min-width: 200px;
  }
  .strategy-selector select:focus { outline: none; border-color: var(--primary); }
  .strategy-selector label { font-size: 13px; color: var(--muted); }
  .refresh-row { display: flex; gap: 12px; align-items: center; margin-bottom: 4px; }
  .refresh-btn { padding: 6px 16px; border: 1px solid var(--primary); border-radius: 6px; background: rgba(250,255,105,0.06); color: var(--primary); cursor: pointer; font-size: 13px; font-weight: 600; }
  .refresh-btn:hover { background: rgba(250,255,105,0.12); }
  .bg-win { background: rgba(16,185,129,0.06); }
  .bg-loss { background: rgba(244,63,94,0.06); }
  @media (max-width: 640px) {
    .picks-table { display: block !important; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .picks-table th, .picks-table td { padding: 8px 10px; font-size: 11px; white-space: nowrap; }
    .stat-cards { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .stat-card { padding: 12px; }
    .stat-card .value { font-size: 18px; }
  }
</style>
</head>
<body>
<script src="../header.js"></script>
<div class="main">

  <div class="page-header">
    <h1>模拟交易</h1>
    <div class="refresh-row">
      <span class="round" id="updateTime">---</span>
      <button class="refresh-btn" onclick="loadAll()">刷新</button>
    </div>
  </div>

  <div class="strategy-selector">
    <label>策略</label>
    <select id="strategySelect" onchange="renderAll()">
      <option value="V11_multifactor">V11 多因子评分 (LONG)</option>
      <option value="funding_extreme">费率极值反转 (LONG)</option>
    </select>
  </div>

  <div id="strategyDesc" class="subtitle" style="margin-bottom:20px;"></div>

  <div class="stat-cards" id="statCards"></div>

  <div class="picks-section">
    <h2>当前持仓 <span class="round" id="posCount">0</span></h2>
    <div id="positionsView"><div class="loading">加载中...</div></div>
  </div>

  <div class="picks-section">
    <h2>已平仓记录 <span class="round" id="closedCount">0</span></h2>
    <div id="closedView"><div class="loading">加载中...</div></div>
  </div>

  <div class="disclaimer">
    模拟交易基于历史数据回放，使用真实信号在历史时间点模拟入场/出场。不含交易费用。历史不代表未来收益。
  </div>

</div>

<script>
var DATA = {};
var STRATEGIES = {
  V11_multifactor: { name: "V11 多因子评分", desc: "费率<P5 + 4h趋势↑ + K线/量/PA/趋势四因子评分>0.18 → LONG。止损-10% | 移动止盈+5% | 最大48h。" },
  funding_extreme: { name: '费率极值反转', desc: '资金费率低于P5分位时反向做多，4h趋势过滤。入场即设SL(-10%)/TP(+10%)，持仓最长48h。' },
};

function loadAll(){
  var ts = Date.now();
  Promise.all([
    fetch('/data/crypto/portfolio.json?'+ts).then(function(r){ return r.json(); }),
    fetch('/data/crypto/signals.json?'+ts).then(function(r){ return r.json(); }).catch(function(){ return null; })
  ]).then(function(results){
    DATA.portfolio = results[0];
    DATA.signals = results[1];
    document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
    renderAll();
  }).catch(function(e){
    document.getElementById('positionsView').innerHTML = '<div class="loading">加载失败: '+e.message+'</div>';
  });
}

function renderAll(){
  var strat = document.getElementById('strategySelect').value;
  var info = STRATEGIES[strat] || STRATEGIES['funding_extreme'];
  document.getElementById('strategyDesc').textContent = info.desc;

  renderStats(strat);
  renderPositions(strat);
  renderClosed(strat);
}

function calcStats(pf, strat){
  var closed = pf.closed || [];
  var positions = pf.positions || [];
  var filteredClosed = closed;
  if (strat) filteredClosed = closed.filter(function(c){ return (c.strategy||'') === strat || !c.strategy || c.strategy === ''; });
  var totalTrades = filteredClosed.length;
  var wins = filteredClosed.filter(function(c){ return (c.exit_pnl||0) > 0; });
  var winRate = totalTrades > 0 ? (wins.length / totalTrades * 100) : 0;
  var totalPnL = 0;
  var returns = [];
  filteredClosed.forEach(function(c){ var p = c.exit_pnl||0; totalPnL += p; returns.push(p); });

  // Include unrealized PnL from open positions for total return display
  var unrealized = 0;
  var filteredOpen = positions;
  if (strat) filteredOpen = positions.filter(function(p){ return (p.strategy||'') === strat || !p.strategy || p.strategy === ''; });
  filteredOpen.forEach(function(p){ unrealized += (p.unrealized_pnl||0); });

  // Stats from closed trades only
  var sumRet = 0, sumRetSq = 0;
  returns.forEach(function(p){ sumRet += p; sumRetSq += p*p; });
  var avgRet = totalTrades > 0 ? sumRet / totalTrades : 0;
  var stdRet = totalTrades > 1 ? Math.sqrt((sumRetSq - sumRet*sumRet/totalTrades) / (totalTrades-1)) : 0;
  var sharpe = stdRet > 0 ? (avgRet / stdRet * Math.sqrt(252)) : 0;

  // Max drawdown from closed
  var peak = 0, drawdown = 0;
  var eq = 0;
  returns.forEach(function(r){ eq += r; peak = Math.max(peak, eq); drawdown = Math.max(drawdown, peak - eq); });
  var maxDD = peak > 0 ? (drawdown / peak * 100) : 0;

  return {
    total_return: totalPnL.toFixed(2),
    win_rate: winRate.toFixed(1),
    sharpe: sharpe.toFixed(2),
    max_dd: maxDD.toFixed(1),
    trades: totalTrades,
    open_positions: (positions||[]).length
  };
}

function renderStats(strat){
  var pf = DATA.portfolio || {};
  var stats = calcStats(pf, strat);
  var signTot = Number(stats.total_return) || 0;
  document.getElementById('statCards').innerHTML = [
    {l:'累计盈亏', v:stats.total_return+'%', cls:signTot>=0?'up':'down'},
    {l:'胜率', v:stats.win_rate+'%', cls:Number(stats.win_rate)>=50?'up':'down'},
    {l:'夏普比率', v:stats.sharpe, cls:''},
    {l:'最大回撤', v:stats.max_dd+'%', cls:Number(stats.max_dd)>20?'down':''},
    {l:'交易笔数', v:stats.trades, cls:''},
    {l:'当前持仓', v:stats.open_positions, cls:''}
  ].map(function(s){ return '<div class="stat-card"><div class="label">'+s.l+'</div><div class="value '+s.cls+'\">'+s.v+'</div></div>'; }).join('');
}

function renderPositions(strat){
  var pf = DATA.portfolio || {};
  var pos = pf.positions || [];
  var filtered = pos;
  if (strat) filtered = pos.filter(function(p){ return (p.strategy||'') === strat || !p.strategy || p.strategy === ''; });
  document.getElementById('posCount').textContent = filtered.length;
  var el = document.getElementById('positionsView');
  if (!filtered.length) { el.innerHTML = '<div class="loading">暂无持仓</div>'; return; }

  function pp(v){ return Math.abs(v) < 1 ? v.toFixed(6) : v.toFixed(4); }
  function duration(entryTime){
    var now = new Date(), then = new Date(entryTime.replace(' ','T'));
    if (isNaN(then.getTime())) return '—';
    var diff = now - then;
    var h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000);
    if (h >= 24) return Math.floor(h/24)+'d '+(h%24)+'h';
    return h+'h '+m+'m';
  }

  var h = '<table class="picks-table"><thead><tr>';
  h += '<th>币种</th><th>方向</th><th>入场价</th><th>当前价</th><th>浮盈亏</th><th>持仓时间</th><th>策略</th><th>入场费率</th>';
  h += '</tr></thead><tbody>';
  filtered.forEach(function(p){
    var pnl = p.unrealized_pnl || 0;
    var pnlClass = pnl > 0 ? 'up' : (pnl < 0 ? 'down' : '');
    h += '<tr>';
    h += '<td><b class="ink">'+p.symbol+'</b></td>';
    h += '<td>'+(p.direction||'LONG')+'</td>';
    h += '<td class="mono">$'+pp(p.entry_price)+'</td>';
    h += '<td class="mono">$'+pp(p.current_price||p.entry_price)+'</td>';
    h += '<td class="mono '+pnlClass+'">'+(pnl>=0?'+':'')+pnl.toFixed(2)+'%</td>';
    h += '<td class="mono">'+duration(p.entry_time)+'</td>';
    h += '<td>'+(p.strategy||'—')+'</td>';
    h += '<td class="mono '+(p.funding_at_entry&&p.funding_at_entry<0?'down':'')+'">'+(p.funding_at_entry!=null ? (p.funding_at_entry>=0?'+':'')+p.funding_at_entry.toFixed(4)+'%' : '—')+'</td>';
    h += '</tr>';
  });
  h += '</tbody></table>';
  el.innerHTML = h;
}

function renderClosed(strat){
  var pf = DATA.portfolio || {};
  var closed = pf.closed || [];
  var filtered = closed;
  if (strat) filtered = closed.filter(function(c){ return (c.strategy||'') === strat || !c.strategy || c.strategy === ''; });
  document.getElementById('closedCount').textContent = filtered.length;
  var el = document.getElementById('closedView');
  if (!filtered.length) { el.innerHTML = '<div class="loading">暂无已平仓记录</div>'; return; }

  function pp(v){ return Math.abs(v) < 1 ? v.toFixed(6) : v.toFixed(4); }
  function tradeDuration(entryTime, exitTime){
    if (!entryTime || !exitTime) return '—';
    var t1 = new Date(entryTime.replace(' ','T'));
    var t2 = new Date(exitTime.replace(' ','T'));
    if (isNaN(t1.getTime()) || isNaN(t2.getTime())) return '—';
    var diff = t2 - t1;
    var h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000);
    if (h >= 24) return Math.floor(h/24)+'d '+(h%24)+'h';
    if (h > 0) return h+'h '+m+'m';
    return m+'m';
  }

  var h = '<table class="picks-table"><thead><tr>';
  h += '<th>币种</th><th>方向</th><th>入场价</th><th>出场价</th><th>盈亏</th><th>平仓原因</th><th>持仓</th><th>策略</th>';
  h += '</tr></thead><tbody>';
  filtered.forEach(function(c){
    var pnl = c.exit_pnl || 0;
    var rowClass = c.exit_reason && c.exit_reason.indexOf('止盈')>=0 ? 'bg-win' : (c.exit_reason && c.exit_reason.indexOf('止损')>=0 ? 'bg-loss' : '');
    var pnlClass = pnl >= 0 ? 'up' : 'down';
    h += '<tr class="'+rowClass+'">';
    h += '<td><b class="ink">'+c.symbol+'</b></td>';
    h += '<td>'+(c.direction||'LONG')+'</td>';
    h += '<td class="mono">$'+pp(c.entry_price)+'</td>';
    h += '<td class="mono">$'+pp(c.exit_price)+'</td>';
    h += '<td class="mono '+pnlClass+'">'+(pnl>=0?'+':'')+pnl.toFixed(2)+'%</td>';
    h += '<td>'+c.exit_reason+'</td>';
    h += '<td>'+tradeDuration(c.entry_time, c.exit_time)+'</td>';
    h += '<td>'+(c.strategy||'—')+'</td>';
    h += '</tr>';
  });
  h += '</tbody></table>';
  el.innerHTML = h;
}

loadAll();
</script>
</body>
</html>
