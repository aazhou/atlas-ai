<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>持仓 · Atlas Terminal</title>
<link rel="stylesheet" href="terminal.css">
</head>
<body>
<div class="mobile-shell">
  <nav class="desktop-nav">
    <div class="nav-brand">ATLAS<br>TERMINAL</div>
    <a class="nav-item" href="index.html"><span class="nav-icon">🏠</span> 全景</a>
    <a class="nav-item" href="signals.html"><span class="nav-icon">⚡</span> 信号</a>
    <a class="nav-item active" href="portfolio.html"><span class="nav-icon">💼</span> 持仓</a>
    <a class="nav-item" href="tools.html"><span class="nav-icon">🔧</span> 工具</a>
  </nav>

  <div class="main-area">
    <div class="global-status" id="globalStatus">
      <span class="mkt-pill"><span class="mkt-dot live"></span>加载中...</span>
    </div>

    <div class="page-content">
      <section class="active" id="section-pos">
        <!-- Market Tabs -->
        <div class="market-tabs">
          <button class="mkt-tab active" data-market="a_stock" onclick="T.switchMarket('a_stock')">🇨🇳 A股</button>
          <button class="mkt-tab" data-market="hk" onclick="T.switchMarket('hk')">🇭🇰 港股</button>
          <button class="mkt-tab" data-market="us" onclick="T.switchMarket('us')">🇺🇸 美股</button>
        </div>

        <!-- Positions Content -->
        <div id="positionsContent">
          <div class="term-card"><div class="card-body">加载中...</div></div>
        </div>
      </section>
    </div>
  </div>
</div>

<nav class="term-tabs">
  <a class="term-tab" href="index.html"><span class="tab-icon">🏠</span>全景</a>
  <a class="term-tab" href="signals.html"><span class="tab-icon">⚡</span>信号</a>
  <a class="term-tab active" href="portfolio.html"><span class="tab-icon">💼</span>持仓</a>
  <a class="term-tab" href="tools.html"><span class="tab-icon">🔧</span>工具</a>
</nav>

<script src="terminal.js"></script>
<script>T.init('pos');</script>
</body>
</html>
