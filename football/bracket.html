<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>淘汰赛晋级图 | Atlas 世界杯</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
.round-section { margin-bottom: 32px; }
  @media (max-width: 640px) { .round-section { margin-bottom: 24px; } }
  .round-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); margin-bottom: 12px; text-align: center; padding: 6px 0; border-bottom: 1px solid var(--hairline); }
  .round-matches { display: flex; flex-direction: column; gap: 8px; }
  .match-row { display: flex; align-items: center; gap: 12px; background: var(--surface-card); border: 1px solid var(--hairline); border-radius: 10px; padding: 12px 16px; transition: border-color 0.15s; }
  @media (max-width: 640px) { .match-row { gap: 6px; padding: 10px 12px; } }
  .match-row:hover { border-color: var(--hairline-strong); }
  .match-row.done { border-color: rgba(34,197,94,0.15); }
  .match-row .flag { font-size: 24px; line-height: 1; flex-shrink: 0; width: 32px; text-align: center; }
  @media (max-width: 640px) { .match-row .flag { font-size: 20px; width: 24px; } }
  .match-row .team { flex: 1; min-width: 0; font-size: 13px; font-weight: 600; color: var(--ink); }
  @media (max-width: 640px) { .match-row .team { font-size: 11px; } }
  .match-row .team.winner { color: var(--accent-emerald); font-weight: 700; }
  .match-row .team.loser { color: var(--muted-soft); font-weight: 500; }
  .match-row .score { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: var(--primary); text-align: center; min-width: 50px; flex-shrink: 0; }
  @media (max-width: 640px) { .match-row .score { font-size: 11px; min-width: 40px; } }
  .match-row .score.pending { font-size: 11px; color: var(--muted-soft); font-weight: 500; }
  @media (max-width: 640px) { .match-row .score.pending { font-size: 9px; } }
  .match-row .vs { font-size: 10px; color: var(--muted-soft); text-align: center; min-width: 30px; flex-shrink: 0; }
  @media (max-width: 640px) { .match-row .vs { font-size: 9px; min-width: 20px; } }
  .connector { display: flex; justify-content: center; padding: 4px 0 8px 0; }
  .connector svg { width: 2px; height: 16px; }
  .connector line { stroke: var(--hairline); stroke-width: 2; }
</style>
<script src="../header.js"></script>
</head>
<body>

<div class="main" id="content"><div class="loading">加载中...</div></div>

<footer class="footer">Atlas <span style="color:var(--muted-soft);font-weight:400;">｜</span> 足球AI预测智能体</footer>

<script>
async function render() {
  const resp = await fetch('../data/football/bracket.json');
  const data = await resp.json();
  const container = document.getElementById('content');

  let html = `<div class="page-header">
    <h1>🏆 淘汰赛晋级图</h1>
    <div class="sub">2026 FIFA World Cup · 从1/16决赛到决赛</div>
  </div>`;

  for (const round of data.rounds) {
    html += `<div class="round-section">
      <div class="round-name">${round.name}</div>
      <div class="round-matches">`;

    for (const m of round.matches) {
      const isDone = m.status === 'done';
      const homeWon = m.winner === 'home';
      const awayWon = m.winner === 'away';
      html += `<div class="match-row${isDone ? ' done' : ''}">
        <span class="flag">${m.home_emoji}</span>
        <span class="team${homeWon ? ' winner' : (awayWon ? ' loser' : '')}">${m.home}</span>
        ${m.score
          ? `<span class="score">${m.score}</span>`
          : `<span class="vs">VS</span><span class="score pending">${m.date || ''}</span>`
        }
        <span class="team${awayWon ? ' winner' : (homeWon ? ' loser' : '')}" style="text-align:right;">${m.away}</span>
        <span class="flag">${m.away_emoji}</span>
      </div>`;
    }
    html += `</div></div>`;
  }

  container.innerHTML = html;
}

render();
</script>
</body>
</html>
