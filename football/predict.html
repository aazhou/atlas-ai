<!DOCTYPE html>
<html lang="zh-CN">
<head>

<style>
/* ── Topbar (3 rows: brand+league tabs, sub nav, date nav) ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--canvas); border-bottom: 1px solid var(--hairline);
    padding: 10px 48px 0;
  }
  @media (max-width: 640px) { .topbar { padding: 8px 16px 0; } }
  .topbar-row {
    display: flex; align-items: center; justify-content: space-between;
    min-height: 40px;
  }
  .topbar-brand { font-size: 14px; font-weight: 600; color: var(--ink); letter-spacing: -0.2px; flex-shrink: 0; }
  
  /* ── League tabs (一级) ── */
  .topbar-tabs { display: flex; gap: 4px; flex-shrink: 0; }
  .topbar-tab {
    font-size: 13px; font-weight: 600; color: var(--muted); text-decoration: none;
    padding: 6px 14px; border-radius: 8px 8px 0 0;
    border: 1px solid transparent; border-bottom: none;
    transition: all 0.15s;
  }
  .topbar-tab:hover { color: var(--ink); background: var(--surface-card); }
  .topbar-tab.active { color: var(--primary); border-color: var(--hairline); background: var(--surface-card); }
  
  /* ── Sub nav (二级) ── */
  .topbar-sub {
    display: flex; gap: 4px; padding: 6px 0 8px 0;
    border-top: 1px solid var(--hairline);
  }
  .topbar-sub .topbar-link {
    font-size: 11px; font-weight: 600; color: var(--muted); text-decoration: none;
    padding: 4px 12px; border-radius: 6px; border: 1px solid transparent;
    transition: all 0.15s;
  }
  .topbar-sub .topbar-link:hover { color: var(--ink); border-color: var(--hairline); }
  .topbar-sub .topbar-link.active { color: var(--primary); border-color: var(--primary); }

  /* ── Date nav ── */
  .topbar-dates {
    display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none;
    -webkit-overflow-scrolling: touch; padding-bottom: 8px;
  }
  .topbar-dates::-webkit-scrollbar { display: none; }
  .nav-date {
    padding: 4px 8px; border-radius: 6px; white-space: nowrap; flex-shrink: 0;
    font-size: 11px; font-weight: 500; cursor: pointer;
    color: var(--muted); background: transparent;
    border: 1px solid transparent;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.15s ease;
  }
  .nav-date:hover { color: var(--ink); background: var(--surface-card); border-color: var(--hairline); }
  .nav-date.active { color: var(--on-primary); background: var(--primary); border-color: var(--primary); font-weight: 600; }

  /* ── Mobile nav ── */
  @media (max-width: 480px) {
    .topbar-tab { font-size: 11px; padding: 5px 10px; }
    .topbar-sub .topbar-link { font-size: 11px; padding: 5px 10px; }
    .topbar-sub .topbar-link svg { margin-right: 0; width: 15px; height: 15px; }
    .topbar-brand { font-size: 12px; }
  }

  /* ── Main ── */

  .page-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 24px; padding-bottom: 20px;
    border-bottom: 1px solid var(--hairline);
  }
  .page-header h1 { font-size: 24px; font-weight: 700; color: var(--ink); letter-spacing: -0.3px; }
  .page-header .round { font-size: 13px; color: var(--muted); font-weight: 500; }
  @media (max-width: 640px) {
    .page-header { flex-direction: column; gap: 4px; }
    .page-header h1 { font-size: 20px; }
  }

  .match-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }

  /* ── Match card ── */
  .match-card {
    background: var(--surface-card); border: 1px solid var(--hairline);
    border-radius: 12px; padding: 20px;
  }
  .match-card.risk-mid { border-color: rgba(245,158,11,0.2); }
  .match-card.live { border-color: rgba(239,68,68,0.2); }
  .match-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .match-top .time { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--primary); font-weight: 600; }
  .match-top .left { display: flex; align-items: center; gap: 8px; }
  .status-badge {
    font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px;
  }
  .status-badge.upcoming { background: rgba(255,255,255,0.06); color: var(--muted); }
  .status-badge.finished { background: rgba(34,197,94,0.1); color: var(--accent-emerald); }
  .status-badge.live { background: rgba(239,68,68,0.1); color: var(--accent-rose); animation: pulse 2s infinite; }
  .live-score { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent-rose); font-weight: 700; }
  50%{opacity:0.5;} }
  .match-top .stage { font-size: 11px; color: var(--muted-soft); }

  .teams { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; }
  .teams .team { flex: 1; display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; color: var(--ink); }
  .teams .team:last-child { justify-content: flex-end; text-align: right; }
  .teams .flag { font-size: 28px; line-height: 1; flex-shrink: 0; }
  .teams .info { display: flex; flex-direction: column; }
  .teams .info .name { font-size: 14px; font-weight: 600; }
  .teams .info .sub { font-size: 11px; color: var(--muted); font-weight: 500; }
  .teams .vs { font-size: 11px; color: var(--muted-soft); flex-shrink: 0; }

  .route { font-size: 11px; color: var(--muted-soft); margin-bottom: 14px; line-height: 1.6; }
  .route .anchor { color: var(--body); font-weight: 500; }

  .odds-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
  .odds-table td { padding: 3px 0; font-size: 12px; }
  .odds-table .label { color: var(--body); }
  .odds-table .price { font-family: 'JetBrains Mono', monospace; color: var(--primary); font-weight: 600; text-align: center; }
  .odds-table .prob { font-family: 'JetBrains Mono', monospace; color: var(--muted-soft); text-align: right; font-size: 10px; }
  .market-info { font-size: 11px; color: var(--muted); margin-bottom: 12px; }

  /* ── Atlas prediction stats ── */
  .pred-stats {
    background: linear-gradient(135deg, rgba(250,255,105,0.05) 0%, rgba(250,255,105,0.01) 100%);
    border: 1px solid rgba(250,255,105,0.15);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 14px;
  }
  .pred-stats-top {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .pred-stats-title { font-size: 13px; font-weight: 700; color: var(--primary); letter-spacing: -0.2px; }
  .match-tier {
    font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 9999px;
    color: var(--on-primary); letter-spacing: 0.3px;
  }
  .match-tier.tier-a { background: var(--accent-emerald); }
  .match-tier.tier-b { background: var(--warning); }
  .match-tier.tier-c { background: var(--muted); }
  .pick-tag {
    font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 5px;
    margin-left: auto; white-space: nowrap;
  }
  .pick-tag.in-picks { color: var(--accent-emerald); background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); }
  .pick-tag.not-in-picks { color: var(--muted-soft); background: rgba(255,255,255,0.03); border: 1px solid var(--hairline); }
  .pred-stats-items {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .pred-stat {
    font-size: 12px; padding: 6px 10px;
    background: rgba(0,0,0,0.15); border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .pred-label { color: var(--muted); font-size: 10px; margin-right: 2px; }
  .pred-stat strong { color: var(--ink); font-size: 13px; font-weight: 600; }
  .pred-odds { font-family: 'JetBrains Mono', monospace; color: var(--primary); font-size: 11px; font-weight: 600; margin-left: 2px; }

  /* Cold risk */
  .risk-tag { font-size: 11px; font-weight: 600; margin-bottom: 4px; }
  .risk-tag.low { color: var(--accent-emerald); }
  .risk-tag.mid { color: var(--warning); }
  .risk-detail { font-size: 11px; color: var(--muted-soft); margin-bottom: 10px; }
  .risk-detail .sig { color: var(--body); }

  .prediction { font-size: 12px; color: var(--body); line-height: 1.5; }

  /* Key factors tags */
  .factors { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .factor {
    font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 6px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .factor.high { background: rgba(239,68,68,0.12); color: var(--accent-rose); border: 1px solid rgba(239,68,68,0.2); }
  .factor.medium { background: rgba(245,158,11,0.1); color: var(--warning); border: 1px solid rgba(245,158,11,0.15); }
  .factor.low { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid var(--hairline); }
  .factor.positive { background: rgba(34,197,94,0.08); color: var(--accent-emerald); border: 1px solid rgba(34,197,94,0.15); }

  /* Review */
  .review-block { background: rgba(255,255,255,0.02); border-radius: 8px; padding: 12px; margin-top: 12px; }
  .review-header { font-size: 12px; font-weight: 600; color: var(--ink); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .review-header .dot { width: 8px; height: 8px; border-radius: 50%; }
  .review-header .dot.hit { background: var(--accent-emerald); }
  .review-header .dot.miss { background: var(--accent-rose); }
  .review-item { font-size: 11px; padding: 2px 0; color: var(--body); display: flex; align-items: center; gap: 6px; }
  .review-item .ri-icon { flex-shrink: 0; }
  .review-item .ri-pick { font-weight: 600; min-width: 100px; }
  .review-item .ri-odds { font-family: 'JetBrains Mono', monospace; color: var(--primary); font-size: 10px; }
  .review-item .ri-note { color: var(--muted); margin-left: auto; text-align: right; }
  .review-summary { font-size: 10px; color: var(--muted-soft); margin-top: 6px; }

  /* Picks */
  .picks-section {
    background: var(--surface-card); border: 1px solid var(--hairline);
    border-radius: 12px; padding: 24px; margin-top: 32px;
  }
  .picks-section h2 { font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
  .picks-section .subtitle { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  .picks-table { width: 100%; border-collapse: collapse; }
  .picks-table th {
    text-align: left; font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted-soft); font-weight: 600;
    padding: 10px 14px; border-bottom: 1px solid var(--hairline);
  }
  .picks-table td { padding: 14px; border-bottom: 1px solid var(--hairline); font-size: 13px; }
  .picks-table tr:hover td { background: rgba(255,255,255,0.01); }
  .picks-table .rank { font-size: 16px; text-align: center; }
  .picks-table .pick-name { color: var(--ink); font-weight: 600; }
  .picks-table .odds-val { font-family: 'JetBrains Mono', monospace; color: var(--primary); font-weight: 600; font-size: 15px; }
  .tier-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 9999px; white-space: nowrap;
  }
  .tier-badge.a { background: var(--accent-emerald); color: var(--on-primary); }
  .tier-badge.b { background: var(--warning); color: var(--on-primary); }
  .tier-badge.fun { background: var(--accent-blue); color: var(--ink); }

  .picks-cards { display: none; }
  @media (max-width: 640px) {
    .picks-table { display: none; }
    .picks-cards { display: block; }
    .pick-card {
      background: var(--surface-card); border: 1px solid var(--hairline);
      border-radius: 8px; padding: 12px; margin-bottom: 8px;
    }
    .pick-card .pc-rank { font-size: 14px; margin-bottom: 4px; }
    .pick-card .pc-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .pick-card .pc-name { font-weight: 600; color: var(--ink); }
    .pick-card .pc-odds { font-family: 'JetBrains Mono', monospace; color: var(--primary); font-size: 13px; }
    .pick-card .pc-logic { font-size: 11px; color: var(--body); }
  }

  .disclaimer { font-size: 11px; color: var(--muted-soft); margin-top: 16px; line-height: 1.5; }

  /* ── Timeline ── */
  .timeline-bottom { margin-top: 32px; }
  .timeline { margin-bottom: 24px; }
  .timeline-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .timeline-header h2 { font-size: 13px; font-weight: 600; color: var(--ink); }
  .timeline-list { display: flex; flex-direction: column; gap: 2px; }
  .timeline-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 7px 0; border-bottom: 1px solid var(--hairline);
    transition: background 0.12s;
  }
  .timeline-item:last-child { border-bottom: none; }
  .timeline-item:hover { background: var(--surface-card); }
  .tl-badge {
    flex-shrink: 0; min-width: 38px; text-align: center;
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 2px 6px; border-radius: 4px;
    background: var(--hairline);
  }
  .tl-
  .tl-time { flex-shrink: 0; font-size: 11px; color: var(--muted-soft); font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
  .tl-content { flex: 1; min-width: 0; }
  .tl-event { font-size: 13px; font-weight: 600; color: var(--ink); }
  .tl-detail { font-size: 12px; color: var(--body); margin-top: 1px; }
  .tl-badge.system { background: rgba(136,136,136,0.12); color: var(--muted); }
  .tl-badge.monitor { background: rgba(59,130,246,0.12); color: var(--accent-blue); }
  .tl-badge.action { background: rgba(250,255,105,0.12); color: var(--primary); }
  .tl-badge.final { background: rgba(34,197,94,0.12); color: var(--accent-emerald); }
  .tl-badge.live { background: rgba(239,68,68,0.12); color: var(--accent-rose); }
  .tl-badge.emergency { background: rgba(239,68,68,0.18); color: var(--accent-rose); }
  .tl-badge.odds_alert { background: rgba(245,158,11,0.12); color: var(--warning); }
  .tl-badge.goal { background: rgba(59,130,246,0.15); color: var(--accent-blue); }
  .tl-badge.review { background: rgba(163,163,163,0.12); color: var(--muted-soft); }
  @media (max-width: 640px) {
    .timeline-list { gap: 6px; }
    .timeline-item {
      flex-direction: column; gap: 4px;
      padding: 10px; background: var(--surface-card);
      border: 1px solid var(--hairline); border-radius: 8px;
      border-bottom: 1px solid var(--hairline);
    }
    .timeline-item.live { border-left: 2px solid var(--accent-rose); }
    .tl-
    .tl-badge { display: inline-block; min-width: auto; }
  }

  .footer { border-top: 1px solid var(--hairline); padding: 32px 0; text-align: center; font-size: 11px; color: var(--muted-soft); }
  .loading { text-align: center; padding: 80px 0; font-size: 14px; color: var(--muted); }
</style>

<body>

<div class="an-dates" id="dateNav"></div>

<div class="main" id="content"><div class="loading">加载中...</div></div>

<footer class="footer">Atlas <span style="color:var(--muted-soft);font-weight:400;">｜</span> 体育预测</footer>

<script>
const DATES = [
  '2026-07-04','2026-07-05','2026-07-06','2026-07-07','2026-07-08',
  '2026-07-10','2026-07-11','2026-07-12',
  '2026-07-15','2026-07-16','2026-07-19','2026-07-20'
];

const now = new Date();
const bj = new Date(now.getTime() + (8*60 + now.getTimezoneOffset()) * 60000);
const today = bj.toISOString().slice(0,10);
let currentDate = DATES.includes(today) ? today : DATES.find(d => d > today) || DATES[DATES.length-1];
let currentLeague = 'wc'; // 'wc'=世界杯, 'csl'=中超
function buildDateNav() {
  const nav = document.getElementById('dateNav');
  if (!nav) return;
  nav.innerHTML = DATES.map(d => {
    const parts = d.split('-');
    const label = `${parseInt(parts[1])}/${parseInt(parts[2])}`;
    return `<span class="nav-date${d === currentDate ? ' active' : ''}" onclick="switchDate('${d}')">${label}</span>`;
  }).join('');
}

function buildLeagueToggle() {
  return `<span class="an-league-pill${currentLeague==='wc'?' active':''}" onclick="switchLeague('wc')">🏆 世界杯</span>
<span class="an-league-pill${currentLeague==='csl'?' active':''}" onclick="switchLeague('csl')">🇨🇳 中超</span>`;
}

async function loadData(date) {
  const prefix = currentLeague === 'csl' ? 'csl-' : '';
  try {
    const resp = await fetch(`../data/football/${prefix}${date}.json`);
    if (resp.ok) return await resp.json();
  } catch(e) {}
  try {
    const resp = await fetch('../data/football/schedule.json');
    if (!resp.ok) return null;
    const schedule = await resp.json();
// 2. schedule.json fallback — filter by league
    const day = schedule.schedule.find(d => {
      if (d.date !== date) return false;
      const wantCSL = currentLeague === 'csl';
      const isCSL = d.league === 'csl';
      return wantCSL === isCSL;  // WC dates have no league field → isCSL=false
    });
    if (!day) return null;
    return {
      date: day.date, round: day.round, updated: null,
      matches: day.matches.map(m => ({...m, status: m.score ? 'finished' : 'upcoming', live_score: m.score || null})),
      top_picks: []
    };
  } catch(e) { return null; }
}

async function switchLeague(league) {
  currentLeague = league;
  // Check if current date has data for this league; if not, fall back
  const data = await loadData(currentDate);
  if (!data) {
    // Find latest date with data for this league
    const resp = await fetch('../data/football/schedule.json');
    if (resp.ok) {
      const schedule = await resp.json();
      const leagueDates = schedule.schedule
        .filter(d => (league === 'csl') === (d.league === 'csl'))
        .map(d => d.date)
        .sort();
      if (leagueDates.length) {
        currentDate = leagueDates[leagueDates.length-1];
      }
    }
  }
  switchDate(currentDate);
}

async function switchDate(date) {
  currentDate = date;
  buildDateNav();
  await render(date);
  window.scrollTo(0, 0);
}

function renderRisk(m) {
  if (m.upset_risk === 'low') {
    return `<div class="risk-tag low">🟢 冷门风险低 · ${m.upset_signals}/8信号</div>
      <div class="risk-detail">让球合理 · 对手无爆冷记录 · 状态正佳</div>`;
  }
  const labels = ['①','②','③','④','⑤','⑥','⑦','⑧'];
  const details = (m.upset_details || []).map((d, i) =>
    `<span class="sig">${labels[i]} ${d}</span>`
  ).join(' &nbsp;·&nbsp; ');
  return `<div class="risk-tag mid">🟡 冷门风险中高 · ${m.upset_signals}/8信号</div>
    <div class="risk-detail">${details}</div>`;
}

function renderReview(r) {
  const hitCount = r.verdicts.filter(v => v.hit).length;
  const total = r.verdicts.length;
  const allHit = hitCount === total;
  const items = r.verdicts.map(v =>
    `<div class="review-item">
      <span class="ri-icon">${v.hit === true ? '🟢收' : v.hit === 'half' ? '🟡输半' : '🔴亏'}</span>
      <span class="ri-pick">${v.pick}</span>
      ${v.odds ? `<span class="ri-odds">@${v.odds}</span>` : ''}
      <span class="ri-note">${v.note}</span>
    </div>`
  ).join('');
  return `<div class="review-block">
    <div class="review-header">
      <span class="dot ${allHit ? 'hit' : 'miss'}"></span>
      预测复盘 · ${hitCount}/${total} 命中
    </div>
    ${items}
    <div class="review-summary">📌 ${r.summary}</div>
  </div>`;
}

function hasPicksMatch(m, topPicks) {
  if (!topPicks || topPicks.length === 0) return false;
  const terms = [m.home_cn, m.away_cn, m.home, m.away].filter(Boolean);
  return topPicks.some(p => terms.some(t => p.pick.indexOf(t) !== -1));
}

function flagHtml(emoji) {
  if (!emoji) return '';
  if (emoji.startsWith('http')) return ''; // 中超队徽URL失效，不显示
  return `<span class="flag">${emoji}</span>`;
}

function renderMatchCard(m, data) {
  const totalProb = 1/m.odds_h2h.home + 1/m.odds_h2h.draw + 1/m.odds_h2h.away;
  const imp = {
    home: (1/m.odds_h2h.home/totalProb*100).toFixed(1),
    draw: (1/m.odds_h2h.draw/totalProb*100).toFixed(1),
    away: (1/m.odds_h2h.away/totalProb*100).toFixed(1)
  };
  const riskCls = m.upset_risk === 'mid' ? ' risk-mid' : '';
  const statusCls = m.status === 'live' ? ' live' : '';
  const statusBadge = m.status === 'live' ? '<span class="status-badge live">🟢 进行中</span>' :
    (m.status === 'finished' ? '<span class="status-badge finished">✅ 已结束</span>' :
    '<span class="status-badge upcoming">赛前</span>');
  const liveScoreHtml = m.live_score ? `<span class="live-score">${m.live_score}</span>` : '';

  return `
  <div class="match-card${riskCls}${statusCls}">
    <div class="match-top">
      <div class="left">
        <span class="time">${m.time} CST</span>
        ${statusBadge}${liveScoreHtml}
      </div>
      <span class="stage">${data.round}</span>
    </div>
    <div class="teams">
      <div class="team">
        ${flagHtml(m.home_emoji)}
        <div class="info"><div class="name">${m.home}</div><div class="sub">${m.home_cn}</div></div>
      </div>
      <span class="vs">VS</span>
      <div class="team" style="justify-content:flex-end;text-align:right;">
        <div class="info" style="text-align:right;"><div class="name">${m.away}</div><div class="sub">${m.away_cn}</div></div>
        ${flagHtml(m.away_emoji)}
      </div>
    </div>

    <div class="route">
      <span class="anchor">${m.away_cn}</span> ${m.route_away}<br>
      <span class="anchor">${m.home_cn}</span> ${m.route_home}
    </div>

    <table class="odds-table">
      <tr><td class="label">${flagHtml(m.away_emoji)} ${m.away}</td><td class="price">@${m.odds_h2h.away}</td><td class="prob">${imp.away}%</td></tr>
      <tr><td class="label">🤝 平局</td><td class="price">@${m.odds_h2h.draw}</td><td class="prob">${imp.draw}%</td></tr>
      <tr><td class="label">${flagHtml(m.home_emoji)} ${m.home}</td><td class="price">@${m.odds_h2h.home}</td><td class="prob">${imp.home}%</td></tr>
    </table>
    <div class="market-info">
      亚盘 ${m.odds_spread.line} @${m.odds_spread.price} &nbsp;|&nbsp; 大小 ${m.odds_totals.line} O@${m.odds_totals.over} / U@${m.odds_totals.under}
    </div>
    ${(m.pred_h2h || m.pred_spread || m.pred_totals) ? `
    <div class="pred-stats">
      <div class="pred-stats-top">
        <span class="pred-stats-title">📊 Atlas预测</span>
        <span class="match-tier tier-${(m.tier || 'C').toLowerCase()}">${m.tier || 'C'}级</span>
        ${hasPicksMatch(m, data.top_picks) ? '<span class="pick-tag in-picks">🔖 入选投注建议</span>' : '<span class="pick-tag not-in-picks">📋 仅供参考</span>'}
      </div>
      <div class="pred-stats-items">
        ${m.pred_h2h ? `<span class="pred-stat"><span class="pred-label">胜平负</span> <strong>${m.pred_h2h}</strong></span>` : ''}
        ${m.pred_spread ? `<span class="pred-stat"><span class="pred-label">亚盘</span> <strong>${m.pred_spread}</strong>${m.odds_spread && m.odds_spread.price ? ` <span class="pred-odds">@${m.odds_spread.price}</span>` : ''}</span>` : ''}
        ${m.pred_totals ? `<span class="pred-stat"><span class="pred-label">大小</span> <strong>${m.pred_totals}</strong></span>` : ''}
        ${(m.pred_scores && m.pred_scores.length > 0) ? `<span class="pred-stat"><span class="pred-label">比分</span> <strong>${m.pred_scores.join(' / ')}</strong></span>` : ''}
      </div>
    </div>` : ''}

    ${(m.factors && m.factors.length > 0) ? `<div class="factors">${m.factors.map(f =>
      `<span class="factor ${f.severity || ''}">${f.icon || ''} ${f.label}</span>`
    ).join('')}</div>` : ''}

    ${renderRisk(m)}

    <div class="prediction">
      ${m.reason}
    </div>
    ${m.status === 'finished' && m.review ? renderReview(m.review) : ''}
  </div>`;
}

function renderScheduleCard(m) {
  const hasRoute = m.route_home && m.route_away && m.route_home !== '待定';
  return `
  <div class="match-card">
    <div class="match-top">
      <div class="left">
        <span class="time">${m.time} CST</span>
        <span class="status-badge upcoming">赛前</span>
      </div>
      <span class="stage"></span>
    </div>
    <div class="teams">
      <div class="team">
        ${flagHtml(m.home_emoji)}
        <div class="info"><div class="name">${m.home}</div><div class="sub">${m.home_cn}</div></div>
      </div>
      <span class="vs">VS</span>
      <div class="team" style="justify-content:flex-end;text-align:right;">
        <div class="info" style="text-align:right;"><div class="name">${m.away}</div><div class="sub">${m.away_cn}</div></div>
        ${flagHtml(m.away_emoji)}
      </div>
    </div>
    ${m.venue ? `<div class="route" style="text-align:center;">📍 ${m.venue}</div>` : ''}
    ${hasRoute ? `<div class="route">
      <span class="anchor">${m.away_cn}</span> ${m.route_away}<br>
      <span class="anchor">${m.home_cn}</span> ${m.route_home}
    </div>` : ''}
    <div class="prediction" style="text-align:center;color:var(--muted);">
      🕐 ${m.time} 开赛 · 盘口分析将于前一日12:00发布
    </div>
  </div>`;
}

async function render(date) {
  const data = await loadData(date);
  const container = document.getElementById('content');
  const hasPrediction = data && data.updated;
  const isUpcoming = !hasPrediction;

  if (!data) {
    container.innerHTML = '<div class="loading">暂无比赛数据</div>';
    return;
  }

  const matchCards = isUpcoming
    ? data.matches.map(m => renderScheduleCard(m)).join('')
    : data.matches.map(m => renderMatchCard(m, data)).join('');

  let html = `
    <div class="page-header">
      <h1>${data.date.split('-').slice(1).map((v,i) => i===0 ? v.replace(/^0/,'')+'月' : v.replace(/^0/,'')+'日').join('')} · ${data.round}</h1>
      <span class="round">${data.matches.length}场${hasPrediction ? ' · ' + data.top_picks.filter(p=>p.tier==='A').length + '个A级推荐' : ' · 赛前'} · ${data.updated || ''}</span>
    </div>
    <div id="leagueToggle" style="display:flex;gap:6px;margin-bottom:20px;"></div>`;

  html += `<div class="match-grid">${matchCards}</div>`;

  if (hasPrediction && data.top_picks.length > 0) {
    const picksHtml = data.top_picks.map(p => {
      const bc = p.tier === 'A' ? 'a' : (p.tier === 'B' ? 'b' : 'fun');
      const verdict = p.hit !== undefined ? (p.hit === true ? ' 🟢收' : p.hit === 'half' ? ' 🟡输半' : ' 🔴亏') : '';
      return `<tr>
        <td class="rank">${p.rank}${verdict}</td>
        <td class="pick-name">${p.pick}</td>
        <td class="odds-val">@${p.odds}</td>
        <td><span class="tier-badge ${bc}">${p.tier === 'A' ? 'A' : p.tier === 'B' ? 'B' : 'C'}</span></td>
        <td style="color:var(--body);">${p.logic}</td>
      </tr>`;
    }).join('');

    const cardsHtml = data.top_picks.map(p => {
      const bc = p.tier === 'A' ? 'a' : (p.tier === 'B' ? 'b' : 'fun');
      const verdict = p.hit !== undefined ? (p.hit === true ? '🟢收' : p.hit === 'half' ? '🟡输半' : '🔴亏') : '';
      return `<div class="pick-card">
        <span class="pc-rank">${p.rank}${verdict ? ' '+verdict : ''}</span>
        <div class="pc-body">
          <div class="pc-top">
            <span class="pc-name">${p.pick}</span>
            ${p.odds ? `<span class="pc-odds">@${p.odds}</span>` : ''}
            <span class="tier-badge ${bc}">${p.tier === 'A' ? 'A' : p.tier === 'B' ? 'B' : 'C'}</span>
          </div>
          <div class="pc-logic">${p.logic}</div>
        </div>
      </div>`;
    }).join('');
    html += `
    <div class="picks-section">
      <h2>投注建议</h2>
      <div class="subtitle">按优先级排列 · 更新于${data.updated}</div>
      <table class="picks-table">
        <thead><tr><th>优先级</th><th>投注</th><th>赔率</th><th>等级</th><th>逻辑</th></tr></thead>
        <tbody>${picksHtml}</tbody>
      </table>
      <div class="picks-cards">${cardsHtml}</div>
      <div class="disclaimer">⚠️ 盘口：Pinnacle + 48家博彩公司均值 · 分析为<b>常规90分钟</b>盘口 · 仅供参考</div>
      ${data.parlays && data.parlays.length > 0 ? `
      <div style="margin-top:12px;padding:12px;background:rgba(250,255,105,0.05);border:1px solid rgba(250,255,105,0.15);border-radius:8px;">
        <div style="font-size:11px;font-weight:600;color:var(--primary);margin-bottom:6px;">🎯 串关推荐</div>
        ${data.parlays.map(p => `
          <div style="display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:4px;">
            <span class="tier-badge ${p.tier==='A'?'a':'b'}">${p.tier}级</span>
            <span>${p.type}: ${p.picks.join(' + ')}</span>
            <span style="font-family:JetBrains Mono;color:var(--primary);font-weight:600;">@${p.odds}</span>
            <span style="color:var(--muted-soft);font-size:11px;">${p.logic}</span>
          </div>
        `).join('')}
      </div>` : ''}
      </div>`;
  }

  if (data.timeline && data.timeline.length > 0) {
    const all = data.timeline.slice().reverse();
    const recent = all.slice(0, 3);
    const rest = all.slice(3);
    const hasMore = rest.length > 0;
    html += `
    <div class="timeline timeline-bottom">
      <div class="timeline-header" onclick="var e=document.getElementById('tl-more-${date.replace(/-/g,'')}');var t=this.querySelector('.tl-toggle');if(e.style.display==='none'||!e.style.display){e.style.display='grid';t.textContent='收起'}else{e.style.display='none';t.textContent='展开全部 ${rest.length}条'}">
        <h2>📡 盘口监控记录</h2>
        ${hasMore ? `<span class="tl-toggle" style="font-size:11px;color:var(--muted);cursor:pointer;">展开全部 ${rest.length}条</span>` : ''}
      </div>
      <div class="timeline-list">
        ${recent.map(t => `
          <div class="timeline-item ${t.type}">
            <span class="tl-badge ${t.type}">${t.type === 'system' ? '初始化' : t.type === 'monitor' ? '监测' : t.type === 'action' ? '决策' : t.type === 'live' ? '⚡滚球' : t.type === 'emergency' ? '🔴紧急' : t.type === 'odds_alert' ? '📊盘口' : t.type === 'goal' ? '⚽进球' : t.type === 'review' ? '📝复盘' : '终盘'}</span>
            <div class="tl-body">
              <span class="tl-time">${t.time}</span>
              <div class="tl-content">
                <div class="tl-event">${t.event}</div>
                <div class="tl-detail">${t.detail}</div>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
      ${hasMore ? `<div class="timeline-list" id="tl-more-${date.replace(/-/g,'')}" style="display:none;">${rest.map(t => `
          <div class="timeline-item ${t.type}">
            <span class="tl-badge ${t.type}">${t.type === 'system' ? '初始化' : t.type === 'monitor' ? '监测' : t.type === 'action' ? '决策' : t.type === 'live' ? '⚡滚球' : t.type === 'emergency' ? '🔴紧急' : t.type === 'odds_alert' ? '📊盘口' : t.type === 'goal' ? '⚽进球' : t.type === 'review' ? '📝复盘' : '终盘'}</span>
            <div class="tl-body">
              <span class="tl-time">${t.time}</span>
              <div class="tl-content">
                <div class="tl-event">${t.event}</div>
                <div class="tl-detail">${t.detail}</div>
              </div>
            </div>
          </div>
        `).join('')}</div>` : ''}
    </div>`;
  }

  container.innerHTML = html;
  const lt = document.getElementById('leagueToggle');
  if (lt) lt.innerHTML = buildLeagueToggle();
}

buildDateNav();
render(currentDate);
</script>

</body>
</html>
