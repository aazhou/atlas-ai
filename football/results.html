<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas AI · 足球 · 成绩单</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
  /* ── A‑tier hero ── */
  .a-hero {
    background: linear-gradient(135deg, rgba(34,197,94,0.08) 0%, rgba(34,197,94,0.02) 100%);
    border: 1px solid rgba(34,197,94,0.2);
    border-radius: 14px; padding: 28px 32px 24px; margin-bottom: 30px;
  }
  @media (max-width: 600px) { .a-hero { padding: 20px 16px; } }
  .a-hero-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--accent-emerald); margin-bottom: 18px;
  }
  .a-hero-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  }
  @media (max-width: 500px) { .a-hero-grid { grid-template-columns: 1fr; gap: 12px; } }
  .a-hero-stat { text-align: center; }
  .a-hero-stat .val {
    font-family: 'JetBrains Mono', monospace; font-size: 40px; font-weight: 700;
    color: var(--accent-emerald); line-height: 1.1;
  }
  @media (max-width: 640px) { .a-hero-stat .val { font-size: 32px; } }
  .a-hero-stat .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .a-hero-stat .sub { font-size: 11px; color: var(--muted-soft); margin-top: 2px; }

  /* ── Tier summary cards ── */
  .tier-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 28px; }
  @media (max-width: 500px) { .tier-summary { grid-template-columns: 1fr; } }
  .tier-card {
    background: var(--surface-card); border: 1px solid var(--hairline);
    border-radius: 10px; padding: 16px; text-align: center;
  }
  .tier-card.a-tier { border-color: rgba(34,197,94,0.25); background: rgba(34,197,94,0.04); }
  .tier-card .tc-tier { font-size: 11px; font-weight: 700; margin-bottom: 6px; }
  .tier-card .tc-rate { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; }
  .tier-card.a-tier .tc-rate { color: var(--accent-emerald); }
  .tier-card .tc-detail { font-size: 11px; color: var(--muted-soft); margin-top: 2px; }

  /* ── History ── */
  .history-filters { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .filter-btn {
    font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 8px;
    border: 1px solid var(--hairline); background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover { color: var(--ink); border-color: var(--hairline-strong); }
  .filter-btn.active { color: var(--on-primary); background: var(--primary); border-color: var(--primary); }
  .section-title { font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 16px; }
  .history-item { background: var(--surface-card); border: 1px solid var(--hairline); border-radius: 10px; padding: 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 14px; }
  @media (max-width: 600px) { .history-item { flex-wrap: wrap; } }
  .history-item .hi-date { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted-soft); min-width: 50px; }
  .history-item .hi-pick { color: var(--ink); font-weight: 600; flex: 1; min-width: 120px; }
  .history-item .hi-odds { font-family: 'JetBrains Mono', monospace; color: var(--primary); font-size: 13px; min-width: 50px; }
  .history-item .hi-result { font-size: 16px; min-width: 28px; text-align: center; }

  .page-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--hairline); }
  .page-header h1 { font-size: 24px; font-weight: 700; color: var(--ink); letter-spacing: -0.3px; }
  .page-header .sub { font-size: 13px; color: var(--muted); font-weight: 500; }
  @media (max-width: 640px) { .page-header { flex-direction: column; gap: 4px; } .page-header h1 { font-size: 20px; } }
</style>
<script src="../header.js"></script>
</head>
<body>

<div class="main" id="content"><div class="loading">加载中...</div></div>

<footer class="footer">Atlas <span style="color:var(--muted-soft);font-weight:400;">｜</span> 足球AI预测智能体</footer>

<script>
async function loadAll() {
  try {
    const resp = await fetch('../data/football/picks_history.json');
    if (!resp.ok) return [];
    const data = await resp.json();
    return data.picks || [];
  } catch(e) { return []; }
}

let currentStatsLeague = 'wc';

async function render() {
  const allPicks = await loadAll();
  const container = document.getElementById('content');

  if (allPicks.length === 0) {
    container.innerHTML = '<div class="loading">暂无完赛数据</div>';
    return;
  }

  // Build per-league stats
  function computeStats(picks) {
    const byTier = {};
    let totalPL = 0, totalBets = 0;
    for (const p of picks) {
      const t = p.tier === '娱乐' ? 'C' : p.tier;
      if (!byTier[t]) byTier[t] = { total: 0, hit: 0, pl: 0, bets: 0 };
      byTier[t].total++;
      if (p.hit === true) byTier[t].hit++;
      if (p.odds != null) {
        const unit = p.hit === true ? (p.odds - 1) : p.hit === 'half' ? -0.5 : -1;
        byTier[t].pl += unit;
        byTier[t].bets++;
        totalPL += unit;
        totalBets++;
      }
    }
    return byTier;
  }

  const statsWC = computeStats(allPicks.filter(p => p.league === '世界杯'));
  const statsCSL = computeStats(allPicks.filter(p => p.league === '中超'));
  const picksWC = allPicks.filter(p => p.league === '世界杯');
  const picksCSL = allPicks.filter(p => p.league === '中超');

  function renderHero(stats, picks, league) {
    const aStats = stats.A || { total: 0, hit: 0, pl: 0, bets: 0 };
    const aRate = aStats.total > 0 ? (aStats.hit/aStats.total*100).toFixed(0) : '-';
    const aROI = aStats.bets > 0 ? (aStats.pl/aStats.bets*100).toFixed(1) : '-';
    const aDays = new Set(picks.filter(p => (p.tier==='A')).map(p=>p.date)).size;
    const name = league === 'wc' ? '世界杯' : '中超';

    let h = `<div class="page-header"><h1>📊 ${name} A级实盘成绩单</h1><span class="sub">${aStats.total}条A级 · ${aDays}个比赛日</span></div>
    <div class="a-hero"><div class="a-hero-label">🥇 A 级 — 实盘投注参考</div>
      <div class="a-hero-grid">
        <div class="a-hero-stat"><div class="val">${aRate}%</div><div class="lbl">A级胜率</div><div class="sub">${aStats.hit} / ${aStats.total} 命中</div></div>
        <div class="a-hero-stat"><div class="val">${aStats.pl >= 0 ? '+' : ''}${aStats.pl.toFixed(2)}</div><div class="lbl">累计收益（每注1单位）</div><div class="sub">${aStats.bets}注</div></div>
        <div class="a-hero-stat"><div class="val">${aStats.pl >= 0 ? '+' : ''}${aROI}%</div><div class="lbl">A级 ROI</div><div class="sub">实盘核心指标</div></div>
      </div>
    </div>
    <div class="section-title">各等级概览</div><div class="tier-summary">`;

    const tierOrder = ['A', 'B', 'C'];
    const tierLabels = { A: '🥇 A级 · 实盘', B: '🥈 B级 · 参考', C: '🥉 C级 · 娱乐' };
    const tierNotes = { A: '实际投注', B: '谨慎参考，通常不投', C: '仅供娱乐' };

    for (const t of tierOrder) {
      const s = stats[t];
      if (!s) { h += `<div class="tier-card${t==='A'?' a-tier':''}"><div class="tc-tier">${tierLabels[t]}</div><div class="tc-rate" style="color:var(--muted-soft);">—</div><div class="tc-detail">暂无数据</div></div>`; continue; }
      const rate = (s.hit/s.total*100).toFixed(0);
      const roi = s.bets > 0 ? (s.pl/s.bets*100).toFixed(1) : '-';
      h += `<div class="tier-card${t==='A'?' a-tier':''}"><div class="tc-tier">${tierLabels[t]}</div><div class="tc-rate">${rate}%</div><div class="tc-detail">${s.hit}/${s.total} · ${s.pl>=0?'+':''}${roi}% ROI · ${tierNotes[t]}</div></div>`;
    }
    h += `</div>`;
    return h;
  }

  function renderLeagueToggle() {
    return `<span class="an-league-pill${currentStatsLeague==='wc'?' active':''}" onclick="switchStatsLeague('wc')">🏆 世界杯</span>
<span class="an-league-pill${currentStatsLeague==='csl'?' active':''}" onclick="switchStatsLeague('csl')">🇨🇳 中超</span>`;
  }

  const picks = currentStatsLeague === 'wc' ? picksWC : picksCSL;
  const stats = currentStatsLeague === 'wc' ? statsWC : statsCSL;

  let html = renderHero(stats, picks, currentStatsLeague);
  // Insert league toggle between header and hero
  html = html.replace('</div>\n    <div class="a-hero">', `</div>
    <div id="statsLeagueToggle" style="display:flex;gap:6px;margin-bottom:20px;">${renderLeagueToggle()}</div>
    <div class="a-hero">`);
  html += `</div>
  <div class="section-title">逐条记录</div>
  <div class="history-filters">
    <button class="filter-btn active" onclick="filterPicks('A')">🥇 A级</button>
    <button class="filter-btn" onclick="filterPicks('all')">全部</button>
  </div>
  <div id="historyList"></div>`;

  // Store picks globally for filtering
  window._picks = picks.sort((a,b) => b.date.localeCompare(a.date) || a.rank.localeCompare(b.rank));
  container.innerHTML = html;
  renderHistory('A');
}

window.switchStatsLeague = switchStatsLeague;

function switchStatsLeague(league) {
  currentStatsLeague = league;
  render();
}

function renderHistory(filter) {
  const list = document.getElementById('historyList');
  const picks = window._picks;
  let filtered;
  if (filter === 'A') filtered = picks.filter(p => (p.tier === 'A'));
  else filtered = picks;

  // Update filter buttons
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', false);
  });
  const btn = document.querySelector(`.filter-btn[onclick*="${filter}"]`);
  if (btn) btn.classList.add('active');

  if (filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:32px;color:var(--muted);">暂无记录</div>';
    return;
  }

  let html = '';
  for (const p of filtered) {
    const bc = p.tier === 'A' ? 'a' : p.tier === 'B' ? 'b' : 'fun';
    const pl = p.odds != null ? (p.hit === true ? '+'+(p.odds-1).toFixed(2) : p.hit === 'half' ? '-0.50' : '-1.00') : '';
    const plColor = p.hit === true ? 'var(--accent-emerald)' : p.hit === 'half' ? '#f59e0b' : 'var(--accent-rose)';
    html += `<div class="history-item">
      <span class="hi-date">${p.date.slice(5).replace('-','/')}</span>
      <span style="font-size:10px;color:var(--muted-soft);min-width:32px;">${p.league||''}</span>
      <span class="hi-pick">${p.pick}</span>
      <span class="hi-odds">${p.odds ? '@'+p.odds : ''}</span>
      <span class="tier-badge ${bc}">${p.tier === 'A' ? 'A' : p.tier === 'B' ? 'B' : 'C'}</span>
      <span class="hi-result">${p.hit === true ? '🟢收' : p.hit === 'half' ? '🟡输半' : '🔴亏'}</span>
      ${pl ? `<span style="font-family:'JetBrains Mono',monospace;color:${plColor};font-size:12px;min-width:50px;text-align:right;">${pl}</span>` : '<span style="min-width:50px;"></span>'}
      <span style="color:var(--muted);font-size:12px;">${p.logic}</span>
    </div>`;
  }
  list.innerHTML = html;
}

// Expose filter function globally
window.filterPicks = renderHistory;

render();
</script>
</body>
</html>
